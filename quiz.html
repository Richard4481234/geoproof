\" x2=\"202\" y2=\"91.1\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"132.7\" y1=\"202\" x2=\"132.7\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"77.3\" x2=\"202\" y2=\"77.3\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"146.6\" y1=\"202\" x2=\"146.6\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"63.4\" x2=\"202\" y2=\"63.4\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"160.4\" y1=\"202\" x2=\"160.4\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"49.6\" x2=\"202\" y2=\"49.6\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"174.3\" y1=\"202\" x2=\"174.3\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"35.7\" x2=\"202\" y2=\"35.7\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"188.1\" y1=\"202\" x2=\"188.1\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"21.9\" x2=\"202\" y2=\"21.9\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"202\" y1=\"202\" x2=\"202\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"8\" x2=\"202\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"105\" x2=\"202\" y2=\"105\" stroke=\"#9a9aa2\" stroke-width=\"1.5\"/><line x1=\"105\" y1=\"202\" x2=\"105\" y2=\"8\" stroke=\"#9a9aa2\" stroke-width=\"1.5\"/><polygon points=\"202,105 196,101.5 196,108.5\" fill=\"#9a9aa2\"/><polygon points=\"105,8 101.5,14 108.5,14\" fill=\"#9a9aa2\"/><text x=\"200\" y=\"118\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#9a9aa2\">x</text><text x=\"110\" y=\"17\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#9a9aa2\">y</text><circle cx=\"146.6\" cy=\"188.1\" r=\"4.5\" fill=\"#B4471F\"/><text x=\"153.6\" y=\"181.1\" font-size=\"12.5\" font-family=\"sans-serif\" fill=\"#1a1a1a\" text-anchor=\"start\">(3, -6)</text></svg>"},
    {"q":"A dilation maps a 5 cm segment to a 20 cm segment. What is the scale factor?","a":"4","o":["1/4","15","100"],"x":"20 ÷ 5 = 4.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Medium"},
    {"q":"A dilation with scale factor 2 changes a figure's area by a factor of:","a":"4","o":["2","8","1/2"],"x":"Areas scale by k²: 2² = 4.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Medium"},
    {"q":"A dilation with scale factor 3 changes a figure's perimeter by a factor of:","a":"3","o":["9","6","1/3"],"x":"Perimeter is a length, so it scales by k itself: 3.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Hard"},
    {"q":"Which transformation does NOT always preserve a figure's size?","a":"dilation","o":["reflection","rotation","translation"],"x":"A dilation resizes the figure; the other three are rigid motions.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Easy"},
    {"q":"A transformation that preserves both distances and angle measures is called a(n):","a":"isometry","o":["dilation","similarity","projection"],"x":"Isometries (rigid motions) preserve distance: reflections, rotations, translations.","f":"Reflection-Visual.html","t":"Reflection","c":"transform","d":"Medium"},
    {"q":"Two mirror lines meet at 50°. The equivalent single rotation turns the figure by:","a":"100°","o":["50°","25°","130°"],"x":"Two intersecting reflections give a rotation of twice the angle: 2·50 = 100°.","f":"TwoReflections-Visual.html","t":"Two Reflections","c":"transform","d":"Hard"},
    {"q":"Two parallel mirror lines are 8 cm apart. The equivalent single translation moves each point by:","a":"16 cm","o":["8 cm","4 cm","64 cm"],"x":"Two parallel reflections translate by twice the gap: 2·8 = 16 cm.","f":"TwoReflections-Visual.html","t":"Two Reflections","c":"transform","d":"Hard"},
    {"q":"A rotation of 40° followed by a rotation of 70° about the same center equals a single rotation of:","a":"110°","o":["30°","2800°","55°"],"x":"Rotations about the same center add: 40 + 70 = 110°.","f":"Rotation-Visual.html","t":"Rotation","c":"transform","d":"Medium"},
    {"q":"In a parallelogram, one angle measures 112°. What is the angle opposite it?","a":"112°","o":["68°","90°","248°"],"x":"Opposite angles of a parallelogram are equal.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"What do the interior angles of any quadrilateral add up to?","a":"360°","o":["180°","540°","720°"],"x":"(4−2)·180 = 360°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Easy"},
    {"q":"Three angles of a quadrilateral are 80°, 95°, and 100°. Find the fourth.","a":"85°","o":["95°","75°","105°"],"x":"Angles sum to 360°: 360 − 80 − 95 − 100 = 85°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium"},
    {"q":"A parallelogram has perimeter 40 and one side 12. Find the adjacent side.","a":"8","o":["28","20","16"],"x":"2(12 + x) = 40 → 12 + x = 20 → x = 8.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Medium"},
    {"q":"A rhombus has sides of length 9. Find its perimeter.","a":"36","o":["81","18","27"],"x":"All four sides are equal: 4·9 = 36.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Easy"},
    {"q":"A rhombus has area 96 and one diagonal 16. Find the other diagonal.","a":"12","o":["6","24","8"],"x":"Area = ½·d₁·d₂ → 96 = ½·16·d₂ → d₂ = 12.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Medium"},
    {"q":"A square has a diagonal of 10. Find its area.","a":"50","o":["100","25","70.7"],"x":"Area of a square = d²/2 = 100/2 = 50.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Medium"},
    {"q":"A square has area 72. Find the length of its diagonal.","a":"12","o":["8.5","36","144"],"x":"Area = d²/2 → d² = 144 → d = 12.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Hard"},
    {"q":"A trapezoid has parallel sides 5 and 11. Find its midsegment.","a":"8","o":["16","6","3"],"x":"Midsegment = (5+11)/2 = 8.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Easy"},
    {"q":"A trapezoid's midsegment is 14 and one base is 20. Find the other base.","a":"8","o":["28","6","34"],"x":"2·14 − 20 = 8.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Medium"},
    {"q":"A trapezoid has area 84 and bases 9 and 12. Find its height.","a":"8","o":["4","10.5","16"],"x":"84 = ½(9+12)·h = 10.5h → h = 8.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Hard"},
    {"q":"In a cyclic quadrilateral, one angle measures 100°. Find the angle opposite it.","a":"80°","o":["100°","180°","90°"],"x":"Opposite angles are supplementary: 180 − 100 = 80°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Easy"},
    {"q":"Opposite angles of a cyclic quadrilateral are 3x and (x+20). Find x.","a":"40","o":["45","35","50"],"x":"3x + x + 20 = 180 → 4x = 160 → x = 40.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium"},
    {"q":"A rectangle has sides 5 and 12. Use Ptolemy's theorem to find its diagonal.","a":"13","o":["17","15","11"],"x":"Ptolemy on a rectangle: d² = 5·5 + 12·12 = 169 → d = 13.","f":"Ptolemy-Visual.html","t":"Ptolemy's Theorem","c":"quad","d":"Hard"},
    {"q":"A tangential quadrilateral has sides 6, 8, 10, and x in order. Find x.","a":"8","o":["12","4","6"],"x":"Pitot: 6 + 10 = 8 + x → x = 8.","f":"Pitot-Visual.html","t":"Pitot's Theorem","c":"quad","d":"Medium"},
    {"q":"For a point P and rectangle ABCD, PA = 4, PC = 7, and PB = 1. Find PD.","a":"8","o":["10","6","9"],"x":"British Flag: 16 + 49 = 1 + PD² → PD² = 64 → PD = 8.","f":"BritishFlag-Visual.html","t":"British Flag Theorem","c":"quad","d":"Hard"},
    {"q":"A quadrilateral has diagonals 12 and 18. Find the perimeter of its Varignon parallelogram.","a":"30","o":["15","60","36"],"x":"The perimeter equals the sum of the diagonals: 12 + 18 = 30.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Medium"},
    {"q":"The Varignon (midpoint) parallelogram has what fraction of the original quadrilateral's area?","a":"1/2","o":["1/4","1/3","the same"],"x":"The midpoint parallelogram always has exactly half the area.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Hard"},
    {"q":"The diagonals of a kite always meet at what angle?","a":"90°","o":["60°","45°","120°"],"x":"A kite's diagonals are perpendicular.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Medium"},
    {"q":"A quadrilateral with four equal sides and four right angles is a:","a":"square","o":["rhombus","rectangle","trapezoid"],"x":"Equal sides plus right angles makes it a square.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Easy"},
    {"q":"Two angles are complementary and one is 52°. Find the other.","a":"38°","o":["128°","48°","42°"],"x":"90 − 52 = 38°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Easy"},
    {"q":"Two angles are supplementary and one is 45°. Find the other.","a":"135°","o":["45°","55°","315°"],"x":"180 − 45 = 135°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Easy"},
    {"q":"An angle is 30° larger than its complement. Find the angle.","a":"60°","o":["30°","45°","75°"],"x":"x = (90 − x) + 30 → 2x = 120 → x = 60°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Medium"},
    {"q":"An angle is twice its supplement. Find the angle.","a":"120°","o":["60°","90°","135°"],"x":"x = 2(180 − x) → 3x = 360 → x = 120°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Medium"},
    {"q":"Angles around a point measure 90°, 85°, 95°, and x. Find x.","a":"90°","o":["80°","100°","85°"],"x":"360 − 90 − 85 − 95 = 90°.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Easy"},
    {"q":"Five equal angles meet around a point. Find each one.","a":"72°","o":["60°","75°","90°"],"x":"360 ÷ 5 = 72°.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Medium"},
    {"q":"Two lines cross and one angle is 133°. Find its vertical angle.","a":"133°","o":["47°","227°","90°"],"x":"Vertical angles are equal: 133°.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Easy"},
    {"q":"Two lines cross; one angle is 3x and its vertical angle is (x+50). Find x.","a":"25","o":["50","12.5","30"],"x":"Vertical angles are equal: 3x = x + 50 → 2x = 50 → x = 25.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Medium"},
    {"q":"Two parallel lines are cut by a transversal. One alternate interior angle is 78°. Find the other.","a":"78°","o":["102°","12°","156°"],"x":"Alternate interior angles are equal: 78°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Easy"},
    {"q":"Co-interior (same-side interior) angles between parallel lines are 2x and 3x. Find x.","a":"36","o":["30","45","60"],"x":"They are supplementary: 2x + 3x = 180 → x = 36.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Medium"},
    {"q":"How many degrees are in a straight angle?","a":"180°","o":["90°","360°","270°"],"x":"A straight angle is half a full turn: 180°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Easy"},
    {"q":"An angle bisector splits a 130° angle into two angles of what measure?","a":"65°","o":["130°","260°","35°"],"x":"130 ÷ 2 = 65°.","f":"AngleBisectorLocus-Visual.html","t":"Angle Bisector (Locus)","c":"angle","d":"Easy"},
    {"q":"Two complementary angles are in the ratio 2:3. Find the larger angle.","a":"54°","o":["36°","60°","108°"],"x":"2x + 3x = 90 → x = 18; the larger is 3·18 = 54°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Medium"},
    {"q":"A triangle has a 90° angle and a 27° angle. Find the third angle.","a":"63°","o":["73°","53°","117°"],"x":"180 − 90 − 27 = 63°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Medium"},
    {"q":"The angles of a triangle are x, 2x−10, and 3x+10. Find x.","a":"30","o":["20","36","25"],"x":"x + 2x − 10 + 3x + 10 = 6x = 180 → x = 30.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Hard"},
    {"q":"Two angles that share a vertex and one side, without overlapping, are called:","a":"adjacent angles","o":["vertical angles","alternate angles","reflex angles"],"x":"Sharing a vertex and a side with no overlap makes them adjacent.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Easy"},
    {"q":"An exterior angle of a triangle is 105°, and the two remote interior angles are equal. Find each of them.","a":"52.5°","o":["75°","37.5°","105°"],"x":"The exterior angle equals their sum: 105 ÷ 2 = 52.5°.","f":"ExteriorAngle-Visual.html","t":"Exterior Angle Theorem","c":"angle","d":"Hard"},
    {"q":"Perpendicular lines meet at an angle of:","a":"90°","o":["45°","180°","60°"],"x":"Perpendicular means meeting at a right angle, 90°.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Easy"},
    {"q":"A central angle measures 140°. Find the inscribed angle on the same arc.","a":"70°","o":["140°","35°","110°"],"x":"An inscribed angle is half the central angle: 140/2 = 70°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Easy"},
    {"q":"An inscribed angle measures 48°. Find the arc it intercepts.","a":"96°","o":["48°","24°","132°"],"x":"Arc = 2 × inscribed angle = 96°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Easy"},
    {"q":"Two inscribed angles subtend the same arc. One measures 40°. What does the other measure?","a":"40°","o":["80°","20°","140°"],"x":"Inscribed angles on the same arc are equal.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Medium"},
    {"q":"Two chords intersect inside a circle, intercepting arcs of 50° and 110°. Find the angle between them.","a":"80°","o":["160°","30°","60°"],"x":"Angle = (50+110)/2 = 80°.","f":"IntersectingChordsAngle-Visual.html","t":"Intersecting Chords Angle","c":"circle","d":"Medium"},
    {"q":"Two secants from an external point intercept arcs of 120° and 40°. Find the angle at that point.","a":"40°","o":["80°","160°","20°"],"x":"Angle = (120−40)/2 = 40°.","f":"SecantsAngle-Visual.html","t":"Intersecting Secants Angle","c":"circle","d":"Medium"},
    {"q":"A tangent and a chord intercept an arc of 140°. Find the tangent–chord angle.","a":"70°","o":["140°","35°","110°"],"x":"The angle is half the intercepted arc: 70°.","f":"TangentChordAngle-Visual.html","t":"Tangent–Chord Angle","c":"circle","d":"Medium"},
    {"q":"Two tangents from an external point intercept a near arc of 100° and a far arc of 260°. Find the angle between them.","a":"80°","o":["160°","180°","40°"],"x":"Angle = (260−100)/2 = 80°.","f":"TangentTangentAngle-Visual.html","t":"Tangent–Tangent Angle","c":"circle","d":"Hard"},
    {"q":"Two chords cross inside a circle. One is split into 5 and 6; the other into 3 and x. Find x.","a":"10","o":["9","2","30"],"x":"5·6 = 3·x → x = 10.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Medium"},
    {"q":"From an external point a tangent of length 8 is drawn, and a secant whose external part is 4. Find the secant's whole length.","a":"16","o":["12","32","2"],"x":"Tangent² = external·whole → 64 = 4·whole → whole = 16.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Hard"},
    {"q":"A circle has radius 9. Find its diameter.","a":"18","o":["4.5","81","28.3"],"x":"Diameter = 2r = 18.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Easy"},
    {"q":"Find the area of a circle with radius 5 (use π ≈ 3.14).","a":"≈ 78.5","o":["≈ 31.4","≈ 15.7","≈ 25"],"x":"A = πr² ≈ 3.14·25 ≈ 78.5.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Easy"},
    {"q":"A circle has circumference 31.4 (π ≈ 3.14). Find its radius.","a":"5","o":["10","15.7","2.5"],"x":"C = 2πr → 31.4 = 6.28r → r = 5.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"Find the arc length of a 60° sector in a circle of radius 9 (π ≈ 3.14).","a":"≈ 9.4","o":["≈ 56.5","≈ 18.8","≈ 4.7"],"x":"Arc = (60/360)·2πr = (1/6)·56.5 ≈ 9.4.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"Find the area of a 60° sector in a circle of radius 12 (π ≈ 3.14).","a":"≈ 75.4","o":["≈ 452","≈ 37.7","≈ 150.8"],"x":"Area = (60/360)·πr² = (1/6)·3.14·144 ≈ 75.4.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Hard"},
    {"q":"A chord that passes through the center of a circle is called a:","a":"diameter","o":["radius","tangent","secant"],"x":"The longest chord passes through the center — the diameter.","f":"ChordBisector-Visual.html","t":"Chord & Center","c":"circle","d":"Easy"},
    {"q":"Two chords of equal length in the same circle are always equidistant from:","a":"the center","o":["the tangent point","each other","the diameter"],"x":"Equal chords sit the same distance from the center.","f":"EqualChords-Visual.html","t":"Equal Chords","c":"circle","d":"Medium"},
    {"q":"A chord of length 16 lies 6 units from the center. Find the circle's radius.","a":"10","o":["8","14","11.7"],"x":"Half the chord is 8; r = √(8² + 6²) = √100 = 10.","f":"ChordBisector-Visual.html","t":"Chord & Center","c":"circle","d":"Hard"},
    {"q":"A circle has radius 10 and a chord of length 12. How far is the chord from the center?","a":"8","o":["6","4","16"],"x":"Half the chord is 6; distance = √(10² − 6²) = √64 = 8.","f":"ChordBisector-Visual.html","t":"Chord & Center","c":"circle","d":"Hard"},
    {"q":"Find the sum of the interior angles of an octagon.","a":"1080°","o":["720°","900°","1440°"],"x":"(8−2)·180 = 1080°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Easy"},
    {"q":"Find each interior angle of a regular pentagon.","a":"108°","o":["72°","120°","90°"],"x":"540 ÷ 5 = 108°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"Find each interior angle of a regular hexagon.","a":"120°","o":["108°","135°","60°"],"x":"720 ÷ 6 = 120°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"Find each exterior angle of a regular pentagon.","a":"72°","o":["108°","60°","36°"],"x":"360 ÷ 5 = 72°.","f":"PolygonExteriorAngleSum-Visual.html","t":"Sum of Exterior Angles","c":"polygon","d":"Medium"},
    {"q":"A regular polygon has 12 sides. Find each exterior angle.","a":"30°","o":["150°","60°","15°"],"x":"360 ÷ 12 = 30°.","f":"PolygonExteriorAngleSum-Visual.html","t":"Sum of Exterior Angles","c":"polygon","d":"Medium"},
    {"q":"The interior angles of a polygon sum to 900°. How many sides does it have?","a":"7","o":["5","6","9"],"x":"(n−2)·180 = 900 → n−2 = 5 → n = 7.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"Each interior angle of a regular polygon is 150°. How many sides does it have?","a":"12","o":["10","15","20"],"x":"Exterior = 180 − 150 = 30; n = 360/30 = 12.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Hard"},
    {"q":"How many diagonals does a hexagon have?","a":"9","o":["6","12","15"],"x":"n(n−3)/2 = 6·3/2 = 9.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"How many diagonals does a decagon have?","a":"35","o":["70","30","40"],"x":"n(n−3)/2 = 10·7/2 = 35.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Hard"},
    {"q":"Find the area of the triangle with vertices (0,0), (8,0), and (0,5).","a":"20","o":["40","13","30"],"x":"Legs 8 and 5 along the axes: Area = ½·8·5 = 20.","f":"Shoelace-Visual.html","t":"Shoelace Formula","c":"polygon","d":"Medium"},
    {"q":"Find the area of the quadrilateral with vertices (1,1), (5,1), (6,4), (2,4).","a":"12","o":["24","14","10"],"x":"Shoelace gives ½|−4+14+16−2| = ½·24 = 12.","f":"Shoelace-Visual.html","t":"Shoelace Formula","c":"polygon","d":"Hard"},
    {"q":"By Pick's theorem, a lattice polygon has 10 interior and 12 boundary points. Find its area.","a":"15","o":["16","21","22"],"x":"Area = I + B/2 − 1 = 10 + 6 − 1 = 15.","f":"Picks-Visual.html","t":"Pick's Theorem","c":"polygon","d":"Medium"},
    {"q":"A lattice polygon has area 20 and 15 interior points. By Pick's theorem, how many boundary points does it have?","a":"12","o":["10","6","14"],"x":"20 = 15 + B/2 − 1 → B/2 = 6 → B = 12.","f":"Picks-Visual.html","t":"Pick's Theorem","c":"polygon","d":"Hard"},
    {"q":"A polygon with 7 sides is called a:","a":"heptagon","o":["hexagon","octagon","nonagon"],"x":"Seven sides makes a heptagon (sometimes called a septagon).","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Easy"},
    {"q":"A right triangle has legs 20 and 21. Find the hypotenuse.","a":"29","o":["41","30","25"],"x":"√(400+441) = √841 = 29.","f":"GeoProof-Visual.html","t":"Pythagorean Theorem","c":"triangle","d":"Easy"},
    {"q":"A right triangle has hypotenuse 25 and one leg 15. Find the other leg.","a":"20","o":["10","18","30"],"x":"√(625−225) = √400 = 20.","f":"GeoProof-Visual.html","t":"Pythagorean Theorem","c":"triangle","d":"Medium"},
    {"q":"A triangle has sides 7 and 8 with a 120° angle between them. Find the third side.","a":"13","o":["11","15","9"],"x":"c² = 49+64 − 2·7·8·cos120° = 113 + 56 = 169 → c = 13.","f":"LawOfCosines-Visual.html","t":"Law of Cosines","c":"triangle","d":"Hard"},
    {"q":"A triangle has sides 13, 14, and 15. Find its area.","a":"84","o":["91","72","105"],"x":"Heron: s = 21, Area = √(21·8·7·6) = √7056 = 84.","f":"Heron-Visual.html","t":"Heron's Formula","c":"triangle","d":"Medium"},
    {"q":"A triangle has sides 9, 10, and 17. Find its area.","a":"36","o":["45","72","40"],"x":"Heron: s = 18, Area = √(18·9·8·1) = √1296 = 36.","f":"Heron-Visual.html","t":"Heron's Formula","c":"triangle","d":"Hard"},
    {"q":"A triangle has angles 90° and 35°. Find the third angle.","a":"55°","o":["65°","45°","125°"],"x":"180 − 90 − 35 = 55°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"triangle","d":"Easy"},
    {"q":"Find the area of an equilateral triangle with side 6 (√3 ≈ 1.732).","a":"≈ 15.6","o":["≈ 18","≈ 9","≈ 31.2"],"x":"Area = (√3/4)·s² = (√3/4)·36 = 9√3 ≈ 15.6.","f":"TriangleAreaSine-Visual.html","t":"Triangle Area (sine)","c":"triangle","d":"Medium"},
    {"q":"A median of a triangle is 27 cm. How far is the centroid from that vertex?","a":"18 cm","o":["9 cm","13.5 cm","27 cm"],"x":"The centroid sits 2/3 along the median: 2/3·27 = 18 cm.","f":"CentroidMedians-Visual.html","t":"Centroid & the 2:1 Median","c":"triangle","d":"Medium"},
    {"q":"Find the area of a triangle with sides 9 and 12 and an included angle of 150°.","a":"27","o":["54","108","13.5"],"x":"Area = ½·9·12·sin150° = 54·0.5 = 27.","f":"TriangleAreaSine-Visual.html","t":"Triangle Area (sine)","c":"triangle","d":"Hard"},
    {"q":"In a triangle, side a = 8 lies opposite angle A = 30°. Find the circumradius R.","a":"8","o":["4","16","12"],"x":"a/sinA = 2R → 8/0.5 = 16 = 2R → R = 8.","f":"LawOfSinesCircumradius-Visual.html","t":"Sine Rule & 2R","c":"triangle","d":"Hard"},
    {"q":"Two sides of a triangle are 5 and 9. The third side must lie strictly between:","a":"4 and 14","o":["5 and 9","0 and 14","4 and 45"],"x":"It must exceed 9−5 = 4 and be less than 9+5 = 14.","f":"TriangleInequality-Visual.html","t":"Triangle Inequality","c":"triangle","d":"Medium"},
    {"q":"A right triangle has legs 6 and 8. Find the altitude drawn to the hypotenuse.","a":"4.8","o":["5","7","3.4"],"x":"Area = 24 and hypotenuse = 10, so ½·10·h = 24 → h = 4.8.","f":"GeometricMean-Visual.html","t":"Geometric Mean","c":"triangle","d":"Hard"},
    {"q":"An angle bisector from A meets BC at D. If AB = 8, AC = 12 and BD = 6, find DC.","a":"9","o":["4","8","12"],"x":"Angle Bisector Theorem: BD/DC = AB/AC → 6/DC = 8/12 → DC = 9.","f":"AngleBisector-Visual.html","t":"Angle Bisector Theorem","c":"triangle","d":"Medium"},
    {"q":"In triangle ABC, AB = 10, AC = 15 and BC = 20. The bisector from A meets BC at D. Find BD.","a":"8","o":["12","10","6"],"x":"BD/DC = 10/15 = 2/3, and BD + DC = 20, so BD = 20·(2/5) = 8.","f":"AngleBisector-Visual.html","t":"Angle Bisector Theorem","c":"triangle","d":"Hard"},
    {"q":"DE ∥ BC in triangle ABC, with AD = 4, DB = 6 and AE = 6. Find EC.","a":"9","o":["4","6","12"],"x":"Basic proportionality: AD/DB = AE/EC → 4/6 = 6/EC → EC = 9.","f":"BasicProportionality-Visual.html","t":"Basic Proportionality","c":"triangle","d":"Medium"},
    {"q":"DE ∥ BC in triangle ABC, with AD = 3, AB = 9 and AE = 4. Find AC.","a":"12","o":["6","8","16"],"x":"AD/AB = AE/AC → 3/9 = 4/AC → AC = 12.","f":"BasicProportionality-Visual.html","t":"Basic Proportionality","c":"triangle","d":"Medium"},
    {"q":"A triangle's midsegment measures 7. Find the side it is parallel to.","a":"14","o":["3.5","7","21"],"x":"A midsegment is half the parallel side, so the side is 2·7 = 14.","f":"Midsegment-Visual.html","t":"Triangle Midsegment","c":"triangle","d":"Easy"},
    {"q":"A triangle has a side of length 18. Find the midsegment parallel to that side.","a":"9","o":["36","18","6"],"x":"The midsegment is half the side: 18/2 = 9.","f":"Midsegment-Visual.html","t":"Triangle Midsegment","c":"triangle","d":"Easy"},
    {"q":"Two similar triangles have sides in the ratio 3:5. The smaller has perimeter 21. Find the larger's perimeter.","a":"35","o":["63","25","12.6"],"x":"Perimeters share the similarity ratio: 21·(5/3) = 35.","f":"AASimilarity-Visual.html","t":"AA Similarity","c":"triangle","d":"Medium"},
    {"q":"Two similar triangles have sides in the ratio 2:3. What is the ratio of their areas?","a":"4:9","o":["2:3","8:27","6:9"],"x":"Areas scale as the square of the ratio: 2²:3² = 4:9.","f":"SASSimilarity-Visual.html","t":"SAS Similarity","c":"triangle","d":"Medium"},
    {"q":"A triangle has area 30 and perimeter 20. Find its inradius.","a":"3","o":["1.5","6","10"],"x":"Area = r·s where s = 10, so r = 30/10 = 3.","f":"AreaInradius-Visual.html","t":"Area = r·s","c":"triangle","d":"Hard"},
    {"q":"A triangle has inradius 4 and semiperimeter 12. Find its area.","a":"48","o":["24","16","96"],"x":"Area = r·s = 4·12 = 48.","f":"AreaInradius-Visual.html","t":"Area = r·s","c":"triangle","d":"Medium"},
    {"q":"The circumcenter of a triangle is the intersection of its:","a":"perpendicular bisectors","o":["medians","altitudes","angle bisectors"],"x":"The perpendicular bisectors of the sides meet at the circumcenter.","f":"Circumcircle-Visual.html","t":"Circumcenter & Circumcircle","c":"triangle","d":"Easy"},
    {"q":"The orthocenter of a triangle is the intersection of its:","a":"altitudes","o":["medians","angle bisectors","perpendicular bisectors"],"x":"The three altitudes are concurrent at the orthocenter.","f":"Orthocenter-Visual.html","t":"Orthocenter","c":"triangle","d":"Easy"},
    {"q":"The incenter of a triangle is the intersection of its:","a":"angle bisectors","o":["medians","altitudes","perpendicular bisectors"],"x":"The three angle bisectors meet at the incenter, the center of the inscribed circle.","f":"Incircle-Visual.html","t":"Incenter & Incircle","c":"triangle","d":"Easy"},
    {"q":"Which of these does NOT generally lie on a triangle's Euler line?","a":"incenter","o":["centroid","orthocenter","circumcenter"],"x":"The Euler line carries the orthocenter, centroid and circumcenter; the incenter generally does not lie on it.","f":"EulerLine-Visual.html","t":"Euler Line","c":"triangle","d":"Hard"},
    {"q":"The nine-point circle's radius is what fraction of the circumradius?","a":"half","o":["one third","twice","the same"],"x":"The nine-point circle has radius R/2.","f":"NinePointCircle-Visual.html","t":"Nine-Point Circle","c":"triangle","d":"Hard"},
    {"q":"In an equilateral triangle, the sum of the distances from any interior point to the three sides equals:","a":"the altitude","o":["the perimeter","the side length","the inradius"],"x":"Viviani's theorem: that sum is constant and equals the triangle's altitude.","f":"Viviani-Visual.html","t":"Viviani's Theorem","c":"triangle","d":"Hard"},
    {"q":"Euler's inequality relates a triangle's circumradius R and inradius r by:","a":"R ≥ 2r","o":["R ≤ 2r","R = 2r always","R ≥ r/2"],"x":"For every triangle R ≥ 2r, with equality only for an equilateral triangle.","f":"EulerInequality-Visual.html","t":"Euler's Inequality","c":"triangle","d":"Hard"},
    {"q":"By Ceva's theorem, three cevians are concurrent exactly when the product of the three side ratios equals:","a":"1","o":["0","2","−1"],"x":"Ceva: (AF/FB)·(BD/DC)·(CE/EA) = 1 when the cevians are concurrent.","f":"Ceva-Visual.html","t":"Ceva's Theorem","c":"triangle","d":"Hard"},
    {"q":"A sector has radius 10 and arc length 15.7 (π ≈ 3.14). Find its central angle.","a":"90°","o":["45°","60°","120°"],"x":"Arc = (θ/360)·2πr → 15.7 = (θ/360)·62.8 → θ/360 = 0.25 → θ = 90°.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Hard"},
    {"q":"Find the area of a 45° sector in a circle of radius 4 (π ≈ 3.14).","a":"≈ 6.3","o":["≈ 12.6","≈ 50.2","≈ 3.1"],"x":"Area = (45/360)·πr² = (1/8)·3.14·16 ≈ 6.3.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"Find the length of a 120° arc in a circle of radius 6 (π ≈ 3.14).","a":"≈ 12.6","o":["≈ 6.3","≈ 37.7","≈ 25.1"],"x":"Arc = (120/360)·2πr = (1/3)·37.7 ≈ 12.6.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"A point lies 13 units from the center of a circle of radius 5. Find the length of the tangent from that point.","a":"12","o":["8","18","6.5"],"x":"Tangent = √(13² − 5²) = √144 = 12.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Hard"},
    {"q":"Two secants from point P: the first has external part 3 and whole length 12; the second has external part 4. Find its whole length.","a":"9","o":["16","6","36"],"x":"Power of a point: 3·12 = 4·w → 36 = 4w → w = 9.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Hard"},
    {"q":"Two chords of a circle are each 5 cm from the center. If one chord is 24 long, how long is the other?","a":"24","o":["12","48","19"],"x":"Chords equidistant from the center are equal in length.","f":"EqualChords-Visual.html","t":"Equal Chords","c":"circle","d":"Medium"},
    {"q":"A chord of length 30 lies 8 units from the center. Find the radius.","a":"17","o":["15","23","19"],"x":"Half-chord 15, so r = √(15² + 8²) = √289 = 17.","f":"ChordBisector-Visual.html","t":"Chord & Center","c":"circle","d":"Hard"},
    {"q":"An inscribed angle intercepts an arc of 210°. Find the angle.","a":"105°","o":["210°","75°","150°"],"x":"An inscribed angle is half its arc: 210/2 = 105°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Medium"},
    {"q":"Two chords meet inside a circle at 55°. One intercepted arc is 70°. Find the other.","a":"40°","o":["110°","35°","55°"],"x":"(70 + x)/2 = 55 → 70 + x = 110 → x = 40°.","f":"IntersectingChordsAngle-Visual.html","t":"Intersecting Chords Angle","c":"circle","d":"Hard"},
    {"q":"The angle at an external point formed by two secants is 25°, and the far arc is 100°. Find the near arc.","a":"50°","o":["75°","25°","150°"],"x":"(100 − x)/2 = 25 → 100 − x = 50 → x = 50°.","f":"SecantsAngle-Visual.html","t":"Intersecting Secants Angle","c":"circle","d":"Hard"},
    {"q":"A tangent–chord angle measures 35°. Find the intercepted arc.","a":"70°","o":["35°","17.5°","145°"],"x":"The arc is twice the tangent–chord angle: 70°.","f":"TangentChordAngle-Visual.html","t":"Tangent–Chord Angle","c":"circle","d":"Medium"},
    {"q":"A tangent from point P touches a circle of radius 7 centered at O, with OP = 25. Find the tangent's length.","a":"24","o":["18","20","26"],"x":"Tangent = √(25² − 7²) = √576 = 24.","f":"TangentRadius-Visual.html","t":"Tangent ⟂ Radius","c":"circle","d":"Medium"},
    {"q":"Two tangents from P touch a circle at A and B. If PA = 13, find PB.","a":"13","o":["26","6.5","10"],"x":"Tangent segments from the same external point are equal.","f":"EqualTangents-Visual.html","t":"Equal Tangents","c":"circle","d":"Easy"},
    {"q":"A triangle has sides 5, 12, 13 and area 30. Find its circumradius.","a":"6.5","o":["13","5","7.5"],"x":"R = abc/(4·Area) = (5·12·13)/120 = 6.5 (half the hypotenuse).","f":"AreaCircumradius-Visual.html","t":"Area = abc/4R","c":"circle","d":"Hard"},
    {"q":"A circle has area 78.5 (π ≈ 3.14). Find its radius.","a":"5","o":["10","25","12.5"],"x":"πr² = 78.5 → r² = 25 → r = 5.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"Find the length of a 90° arc in a circle of radius 14 (π ≈ 3.14).","a":"≈ 22","o":["≈ 44","≈ 11","≈ 88"],"x":"Arc = ¼·2πr = ¼·87.9 ≈ 22.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"An angle is three times its complement. Find the angle.","a":"67.5°","o":["22.5°","60°","45°"],"x":"x = 3(90 − x) → 4x = 270 → x = 67.5°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Hard"},
    {"q":"An angle is equal to its own supplement. Find the angle.","a":"90°","o":["45°","180°","60°"],"x":"x = 180 − x → 2x = 180 → x = 90°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Medium"},
    {"q":"Two supplementary angles are such that one is four times the other. Find the smaller angle.","a":"36°","o":["144°","45°","30°"],"x":"x + 4x = 180 → 5x = 180 → x = 36°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Medium"},
    {"q":"Angles around a point measure 4x, 5x and 6x. Find x.","a":"24","o":["30","15","36"],"x":"4x + 5x + 6x = 360 → 15x = 360 → x = 24.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Medium"},
    {"q":"Two lines cross, forming angles 2x, 3x, 2x and 3x. Find x.","a":"36","o":["72","45","18"],"x":"Adjacent angles are supplementary: 2x + 3x = 180 → x = 36.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Medium"},
    {"q":"Corresponding angles between parallel lines are (5x−10) and (3x+30). Find x.","a":"20","o":["10","40","15"],"x":"Corresponding angles are equal: 5x − 10 = 3x + 30 → 2x = 40 → x = 20.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Medium"},
    {"q":"Co-interior angles between parallel lines are x and (x+40). Find x.","a":"70","o":["50","90","35"],"x":"They are supplementary: x + x + 40 = 180 → 2x = 140 → x = 70.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Medium"},
    {"q":"A reflex angle measures between:","a":"180° and 360°","o":["90° and 180°","0° and 90°","exactly 180°"],"x":"A reflex angle is larger than a straight angle but less than a full turn.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Easy"},
    {"q":"An acute angle measures:","a":"less than 90°","o":["exactly 90°","between 90° and 180°","more than 180°"],"x":"Acute means smaller than a right angle.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Easy"},
    {"q":"The angles of a triangle are in the ratio 1:2:3. Find the smallest angle.","a":"30°","o":["60°","45°","20°"],"x":"x + 2x + 3x = 180 → 6x = 180 → x = 30°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Medium"},
    {"q":"Find each acute angle of an isosceles right triangle.","a":"45°","o":["60°","30°","90°"],"x":"The two equal acute angles share the remaining 90°: 45° each.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Easy"},
    {"q":"Vertical angles measure (4x+10) and (6x−20). Find x.","a":"15","o":["10","20","5"],"x":"Vertical angles are equal: 4x + 10 = 6x − 20 → 2x = 30 → x = 15.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Medium"},
    {"q":"Alternate exterior angles between parallel lines: one measures 118°. Find the other.","a":"118°","o":["62°","28°","242°"],"x":"Alternate exterior angles are equal: 118°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Easy"},
    {"q":"The bisectors of the two angles in a linear pair meet at an angle of:","a":"90°","o":["45°","180°","60°"],"x":"Half of each of two supplementary angles totals 90°.","f":"AngleBisectorLocus-Visual.html","t":"Angle Bisector (Locus)","c":"angle","d":"Hard"},
    {"q":"An exterior angle of a triangle is 140° and one remote interior angle is 60°. Find the other.","a":"80°","o":["40°","70°","100°"],"x":"The exterior angle equals the sum of the remote interior angles: 140 − 60 = 80°.","f":"ExteriorAngle-Visual.html","t":"Exterior Angle Theorem","c":"angle","d":"Medium"},
    {"q":"A triangle can never contain two:","a":"right angles","o":["acute angles","equal angles","unequal angles"],"x":"Two right angles alone total 180°, leaving nothing for the third angle.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Medium"},
    {"q":"A parallelogram has sides 4 and 7 and one diagonal 7. Find the other diagonal.","a":"9","o":["11","8","5"],"x":"Parallelogram law: 2(4²+7²) = 130 = 7² + d² → d² = 81 → d = 9.","f":"ParallelogramLaw-Visual.html","t":"Parallelogram Law","c":"quad","d":"Hard"},
    {"q":"The parallelogram law states that the sum of the squares of the four sides equals:","a":"the sum of the squares of the diagonals","o":["the product of the diagonals","twice the area","the square of the perimeter"],"x":"For a parallelogram, 2(a²+b²) = p² + q².","f":"ParallelogramLaw-Visual.html","t":"Parallelogram Law","c":"quad","d":"Medium"},
    {"q":"A parallelogram has base 12 and height 5. Find its area.","a":"60","o":["34","30","17"],"x":"Area = base × height = 12 × 5 = 60.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"A parallelogram has area 84 and base 14. Find its height.","a":"6","o":["70","12","8"],"x":"Height = area ÷ base = 84 ÷ 14 = 6.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Medium"},
    {"q":"A rhombus has side 13 and one diagonal 10. Find the other diagonal.","a":"24","o":["12","26","16"],"x":"Half-diagonals: 5 and √(13²−5²) = 12, so the full diagonal is 24.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Hard"},
    {"q":"An isosceles trapezoid has bases 7 and 13 and legs of 5. Find its height.","a":"4","o":["3","5","6"],"x":"Each base overhang is (13−7)/2 = 3, so h = √(5²−3²) = 4.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Hard"},
    {"q":"In an isosceles trapezoid, the two base angles on the same base are:","a":"equal","o":["supplementary","complementary","always right angles"],"x":"Isosceles trapezoids are symmetric, so base angles match.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Easy"},
    {"q":"The diagonals of a rectangle are always:","a":"equal in length","o":["perpendicular","unequal","parallel"],"x":"A rectangle's diagonals are congruent (though not generally perpendicular).","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"A parallelogram has equal diagonals only when it is a:","a":"rectangle","o":["rhombus","trapezoid","kite"],"x":"Equal diagonals force right angles, making it a rectangle.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Medium"},
    {"q":"A quadrilateral with exactly one pair of parallel sides is a:","a":"trapezoid","o":["parallelogram","rhombus","kite"],"x":"Exactly one pair of parallel sides defines a trapezoid.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Easy"},
    {"q":"In a cyclic quadrilateral ABCD, angle A = 95°. Find angle C.","a":"85°","o":["95°","105°","180°"],"x":"A and C are opposite, so they are supplementary: 180 − 95 = 85°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Easy"},
    {"q":"In a cyclic quadrilateral ABCD, Ptolemy's theorem says AB·CD + BC·AD equals:","a":"AC·BD","o":["AB·BC","the perimeter","the area"],"x":"Ptolemy: the sum of the products of opposite sides equals the product of the diagonals.","f":"Ptolemy-Visual.html","t":"Ptolemy's Theorem","c":"quad","d":"Medium"},
    {"q":"Find the area of a cyclic quadrilateral whose four sides all measure 3.","a":"9","o":["12","6","81"],"x":"Brahmagupta: s = 6, Area = √(3·3·3·3) = √81 = 9.","f":"Brahmagupta-Visual.html","t":"Brahmagupta's Formula","c":"quad","d":"Medium"},
    {"q":"A tangential quadrilateral has sides 7, 9, 11 and x in order. Find x.","a":"9","o":["13","7","5"],"x":"Pitot: 7 + 11 = 9 + x → x = 9.","f":"Pitot-Visual.html","t":"Pitot's Theorem","c":"quad","d":"Medium"},
    {"q":"For a point P and rectangle ABCD, PA = 5, PC = 10 and PD = 2. Find PB.","a":"11","o":["9","13","7"],"x":"British Flag: 25 + 100 = PB² + 4 → PB² = 121 → PB = 11.","f":"BritishFlag-Visual.html","t":"British Flag Theorem","c":"quad","d":"Hard"},
    {"q":"The Varignon parallelogram is a rhombus exactly when the original quadrilateral's diagonals are:","a":"equal in length","o":["perpendicular","parallel","bisecting"],"x":"Its sides are half the diagonals, so equal diagonals give four equal sides.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Hard"},
    {"q":"The Varignon parallelogram is a rectangle exactly when the original quadrilateral's diagonals are:","a":"perpendicular","o":["equal","parallel","concurrent"],"x":"Its sides are parallel to the diagonals, so perpendicular diagonals give right angles.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Hard"},
    {"q":"A trapezoid's midsegment is parallel to:","a":"both bases","o":["the legs","one leg only","the diagonals"],"x":"The midsegment runs parallel to both parallel sides.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Easy"},
    {"q":"Find the sum of the interior angles of a nonagon (9 sides).","a":"1260°","o":["1080°","1440°","900°"],"x":"(9−2)·180 = 1260°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"Find each interior angle of a regular decagon.","a":"144°","o":["36°","135°","150°"],"x":"(10−2)·180/10 = 1440/10 = 144°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"Find each exterior angle of a regular octagon.","a":"45°","o":["135°","60°","40°"],"x":"360 ÷ 8 = 45°.","f":"PolygonExteriorAngleSum-Visual.html","t":"Sum of Exterior Angles","c":"polygon","d":"Easy"},
    {"q":"The interior angles of a polygon sum to 1800°. How many sides does it have?","a":"12","o":["10","11","14"],"x":"(n−2)·180 = 1800 → n − 2 = 10 → n = 12.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"Each interior angle of a regular polygon is 160°. How many sides does it have?","a":"18","o":["16","20","24"],"x":"Exterior = 180 − 160 = 20; n = 360/20 = 18.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Hard"},
    {"q":"How many diagonals does a heptagon (7 sides) have?","a":"14","o":["7","21","10"],"x":"n(n−3)/2 = 7·4/2 = 14.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"A polygon has 20 diagonals. How many sides does it have?","a":"8","o":["10","7","12"],"x":"n(n−3)/2 = 20 → n² − 3n − 40 = 0 → n = 8.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Hard"},
    {"q":"Find the area of a regular hexagon with side 4 (√3 ≈ 1.732).","a":"≈ 41.6","o":["≈ 24","≈ 27.7","≈ 83.1"],"x":"Area = (3√3/2)s² = (3√3/2)·16 = 24√3 ≈ 41.6.","f":"RegularPolygonArea-Visual.html","t":"Regular Polygon Area","c":"polygon","d":"Hard"},
    {"q":"The area of a regular polygon equals ½ × apothem × ___.","a":"perimeter","o":["side length","number of sides","radius"],"x":"Area = ½·a·P, splitting the polygon into triangles of height a.","f":"RegularPolygonArea-Visual.html","t":"Regular Polygon Area","c":"polygon","d":"Medium"},
    {"q":"A regular polygon has apothem 6 and perimeter 40. Find its area.","a":"120","o":["240","46","60"],"x":"Area = ½·a·P = ½·6·40 = 120.","f":"RegularPolygonArea-Visual.html","t":"Regular Polygon Area","c":"polygon","d":"Medium"},
    {"q":"Find the area of the triangle with vertices (2,0), (9,0) and (2,6).","a":"21","o":["42","18","24"],"x":"Legs 7 and 6 at a right angle: Area = ½·7·6 = 21.","f":"Shoelace-Visual.html","t":"Shoelace Formula","c":"polygon","d":"Medium"},
    {"q":"Find the area of the quadrilateral with vertices (0,0), (6,0), (6,4), (0,8).","a":"36","o":["24","48","30"],"x":"Shoelace: ½|0 + 24 + 48 + 0| = ½·72 = 36.","f":"Shoelace-Visual.html","t":"Shoelace Formula","c":"polygon","d":"Hard"},
    {"q":"By Pick's theorem, a lattice polygon has 4 interior and 10 boundary points. Find its area.","a":"8","o":["9","13","14"],"x":"Area = I + B/2 − 1 = 4 + 5 − 1 = 8.","f":"Picks-Visual.html","t":"Pick's Theorem","c":"polygon","d":"Medium"},
    {"q":"A lattice triangle has no interior points and exactly 3 boundary points. Find its area.","a":"0.5","o":["1","1.5","0"],"x":"Area = 0 + 3/2 − 1 = 0.5 — the smallest possible lattice triangle.","f":"Picks-Visual.html","t":"Pick's Theorem","c":"polygon","d":"Hard"},
    {"q":"In a regular five-pointed star, each point angle measures:","a":"36°","o":["72°","45°","60°"],"x":"The five equal point angles total 180°, so each is 36°.","f":"StarAngleSum-Visual.html","t":"Star Angle Sum","c":"polygon","d":"Medium"},

    {"q":"A dilation with scale factor 5 maps a figure of area 3 to a figure of area:","a":"75","o":["15","8","45"],"x":"Areas scale by k²: 3·25 = 75.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Hard"},
    {"q":"A dilation with a scale factor between 0 and 1 produces an image that is:","a":"smaller than the original","o":["larger than the original","the same size","rotated"],"x":"A factor under 1 shrinks the figure — a reduction.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Easy"},
    {"q":"Which transformation maps a figure with line symmetry onto itself?","a":"reflection","o":["dilation","translation","glide reflection"],"x":"Reflecting across its line of symmetry leaves the figure unchanged.","f":"Reflection-Visual.html","t":"Reflection","c":"transform","d":"Medium"},
    {"q":"The composition of two translations is always a:","a":"translation","o":["rotation","reflection","dilation"],"x":"Adding two vectors gives another vector, so the result is a translation.","f":"Translation-Visual.html","t":"Translation","c":"transform","d":"Medium"},
    {"q":"Two mirror lines meet at 90°. The equivalent single rotation is:","a":"180°","o":["90°","45°","360°"],"x":"Two intersecting reflections rotate by twice the angle: 2·90 = 180°.","f":"TwoReflections-Visual.html","t":"Two Reflections","c":"transform","d":"Medium"},
    {"q":"Two supplementary angles differ by 40°. Find the larger one.","a":"110°","o":["70°","100°","140°"],"x":"x + y = 180 and x − y = 40 → 2x = 220 → x = 110°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Hard"},
    {"q":"The complement of an angle is one quarter of its supplement. Find the angle.","a":"60°","o":["30°","45°","72°"],"x":"90 − x = (180 − x)/4 → 360 − 4x = 180 − x → 3x = 180 → x = 60°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Hard"},
    {"q":"An angle's supplement exceeds twice its complement by 20°. Find the angle.","a":"20°","o":["40°","70°","30°"],"x":"180 − x = 2(90 − x) + 20 → 180 − x = 200 − 2x → x = 20°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Hard"},
    {"q":"Three angles around a point are in the ratio 3:4:5. Find the largest.","a":"150°","o":["120°","90°","180°"],"x":"12x = 360 → x = 30, so the largest is 5·30 = 150°.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Hard"},
    {"q":"Co-interior angles between parallel lines are (3x+10) and (2x+20). Find x.","a":"30","o":["20","36","25"],"x":"They are supplementary: 5x + 30 = 180 → x = 30.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Hard"},
    {"q":"In a triangle the second angle is twice the first, and the third is 20° more than the second. Find the first angle.","a":"32°","o":["30°","36°","40°"],"x":"x + 2x + (2x+20) = 180 → 5x = 160 → x = 32°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Hard"},
    {"q":"The angles of a triangle are (x+10), (2x−30) and (3x+20). Find the largest angle.","a":"110°","o":["40°","30°","90°"],"x":"6x = 180 → x = 30, giving 40°, 30° and 110°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Hard"},
    {"q":"An exterior angle of a triangle is three times its adjacent interior angle. Find that interior angle.","a":"45°","o":["60°","135°","30°"],"x":"They form a linear pair: x + 3x = 180 → x = 45°.","f":"ExteriorAngle-Visual.html","t":"Exterior Angle Theorem","c":"angle","d":"Hard"},
    {"q":"Two complementary angles differ by 24°. Find the larger one.","a":"57°","o":["33°","66°","52°"],"x":"x + y = 90 and x − y = 24 → 2x = 114 → x = 57°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Hard"},
    {"q":"Two adjacent angles form a right angle. At what angle do their bisectors meet?","a":"45°","o":["90°","30°","60°"],"x":"Each bisector takes half, and the halves total 90/2 = 45°.","f":"AngleBisectorLocus-Visual.html","t":"Angle Bisector (Locus)","c":"angle","d":"Hard"},
    {"q":"In triangle ABC, angle A = 40°. The bisectors of B and C meet at I. Find angle BIC.","a":"110°","o":["100°","140°","70°"],"x":"Angle BIC = 90° + A/2 = 90 + 20 = 110°.","f":"AngleBisector-Visual.html","t":"Angle Bisector Theorem","c":"angle","d":"Hard"},
    {"q":"A transversal cuts two parallel lines; one angle is 5x and its corresponding angle is (2x+45). Find x.","a":"15","o":["9","20","45"],"x":"Corresponding angles are equal: 5x = 2x + 45 → 3x = 45 → x = 15.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Hard"},

h=\"1\"/><line x1=\"8\" y1=\"72.7\" x2=\"202\" y2=\"72.7\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"153.5\" y1=\"202\" x2=\"153.5\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"56.5\" x2=\"202\" y2=\"56.5\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"169.7\" y1=\"202\" x2=\"169.7\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"40.3\" x2=\"202\" y2=\"40.3\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"185.8\" y1=\"202\" x2=\"185.8\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"24.2\" x2=\"202\" y2=\"24.2\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"202\" y1=\"202\" x2=\"202\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"8\" x2=\"202\" y2=\"8\" stroke=\"#eeeef1\" stroke-width=\"1\"/><line x1=\"8\" y1=\"105\" x2=\"202\" y2=\"105\" stroke=\"#9a9aa2\" stroke-width=\"1.5\"/><line x1=\"105\" y1=\"202\" x2=\"105\" y2=\"8\" stroke=\"#9a9aa2\" stroke-width=\"1.5\"/><polygon points=\"202,105 196,101.5 196,108.5\" fill=\"#9a9aa2\"/><polygon points=\"105,8 101.5,14 108.5,14\" fill=\"#9a9aa2\"/><text x=\"200\" y=\"118\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#9a9aa2\">x</text><text x=\"110\" y=\"17\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#9a9aa2\">y</text><circle cx=\"185.8\" cy=\"72.7\" r=\"4.5\" fill=\"#B4471F\"/><text x=\"192.8\" y=\"65.7\" font-size=\"12.5\" font-family=\"sans-serif\" fill=\"#1a1a1a\" text-anchor=\"start\">(5, 2)</text></svg>"},
    {"q":"Two dilations about the same center, with factors 3 and 1/6, compose to a single dilation of factor:","a":"1/2","o":["2","1/3","18"],"x":"Scale factors multiply: 3 × 1/6 = 1/2.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Hard"},
    {"q":"How many sides does a quadrilateral have?","a":"4","o":["3","5","6"],"x":"Quad- means four.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Easy"},
    {"q":"How many pairs of parallel sides does a parallelogram have?","a":"2","o":["1","0","4"],"x":"Both pairs of opposite sides are parallel.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"The opposite sides of a parallelogram are:","a":"equal and parallel","o":["perpendicular","unequal","always vertical"],"x":"That is the defining property of a parallelogram.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"A square is a special case of both a rectangle and a:","a":"rhombus","o":["trapezoid","kite only","pentagon"],"x":"A square has right angles (rectangle) and four equal sides (rhombus).","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Easy"}
  ];

  var CATS=[['all','All topics'],['triangle','Triangles'],['circle','Circles'],['angle','Angles'],['quad','Quadrilaterals'],['polygon','Polygons'],['transform','Transformations']];
  var DIFFS=[['all','All levels'],['Easy','Easy'],['Medium','Medium'],['Hard','Hard']];
  var LENS=[[10,'10'],[20,'20'],[0,'All']];
  var BK='gp:quizbestpct';
  var SK='gp:quizstats';
  var sel={cat:'all',diff:'all',len:10};

  // ---- per-question history: powers adaptive rounds + lifetime stats ----
  function qid(it){ var s=it.q, hsh=0; for(var i=0;i<s.length;i++){ hsh=(hsh*31+s.charCodeAt(i))|0; } return String(hsh); }
  function getStats(){ try{ return JSON.parse(localStorage.getItem(SK))||{}; }catch(e){ return {}; } }
  function recordStat(it,ok){
    var st=getStats(), k=qid(it), e=st[k]||{r:0,w:0};
    if(ok) e.r++; else e.w++; st[k]=e;
    try{ localStorage.setItem(SK,JSON.stringify(st)); }catch(e2){}
    try{ window.dispatchEvent(new CustomEvent('gp:quizchange')); }catch(e2){}
  }
  function lifetime(){ var st=getStats(), r=0, w=0; for(var k in st){ r+=st[k].r||0; w+=st[k].w||0; } return {r:r,w:w,total:r+w}; }

  var card=document.getElementById('quizCard');
  var quiz, idx, score, log, retry;

  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function pool(){ return BANK.filter(function(it){ return (sel.cat==='all'||it.c===sel.cat) && (sel.diff==='all'||it.d===sel.diff); }); }

  function chipRow(label,items,curVal,onName){
    var h='<div class="setup-row"><div class="setup-label">'+label+'</div><div class="chips">';
    items.forEach(function(p){ h+='<button type="button" class="chip'+(p[0]===curVal?' active':'')+'" data-act="'+onName+'" data-v="'+p[0]+'">'+esc(p[1])+'</button>'; });
    return h+'</div></div>';
  }

  function statsLine(){
    var lt=lifetime(), st=getStats();
    var tip='Answer with keys <b>1</b>–<b>4</b>, then <b>Enter</b> for the next question.';
    if(!lt.total) return '<p class="q-best" style="text-align:center;margin-top:14px;">'+tip+'</p>';
    var pct=Math.round(lt.r/lt.total*100);
    var weakN=pool().filter(function(it){ var s=st[qid(it)]; return !!(s&&s.w>0); }).length;
    return '<p class="q-best" style="text-align:center;margin-top:14px;">'
      +'You have answered <b>'+lt.total+'</b> question'+(lt.total===1?'':'s')+' — <b>'+pct+'%</b> correct.'
      +(weakN?' Rounds favour the <b>'+weakN+'</b> you have missed before.':'')
      +'<br>'+tip+'</p>';
  }

  function renderStart(){
    var n=pool().length;
    var h=chipRow('Topic',CATS,sel.cat,'cat')
      +chipRow('Difficulty',DIFFS,sel.diff,'diff')
      +chipRow('Questions per round',LENS,sel.len,'len')
      +'<button type="button" class="start-btn" id="startBtn"'+(n===0?' disabled':'')+'>'
      +(n===0?'No questions match — widen your filters':'Start round ('+Math.min(sel.len||n,n)+' question'+((Math.min(sel.len||n,n))===1?'':'s')+')')
      +'</button>'+statsLine();
    card.innerHTML=h;
    Array.prototype.forEach.call(card.querySelectorAll('.chip'),function(b){
      b.addEventListener('click',function(){
        var act=b.getAttribute('data-act'), v=b.getAttribute('data-v');
        if(act==='len') sel.len=parseInt(v,10); else sel[act]=v;
        renderStart();
      });
    });
    var sb=document.getElementById('startBtn');
    if(sb && n>0) sb.addEventListener('click',start);
  }

  function start(){
    var p=pool().slice();
    var n=sel.len===0?p.length:Math.min(sel.len,p.length);
    // adaptive: prioritise questions this person has missed before
    var st=getStats();
    var weak=shuffle(p.filter(function(it){ var s=st[qid(it)]; return !!(s&&s.w>0); }));
    var fresh=shuffle(p.filter(function(it){ var s=st[qid(it)]; return !(s&&s.w>0); }));
    var take=Math.min(weak.length, Math.ceil(n*0.4));
    var picked=weak.slice(0,take).concat(fresh.slice(0,n-take));
    if(picked.length<n){
      var used={}; picked.forEach(function(it){ used[qid(it)]=1; });
      var extra=weak.concat(fresh).filter(function(it){ return !used[qid(it)]; });
      picked=picked.concat(extra.slice(0,n-picked.length));
    }
    quiz=shuffle(picked.slice(0,n)); idx=0; score=0; log=[]; retry=false;
    renderQ();
  }

  // Re-run a round built only from the questions just missed.
  function startRetry(items){
    quiz=shuffle(items.slice()); idx=0; score=0; log=[]; retry=true;
    renderQ();
  }

  function renderQ(){
    if(idx>=quiz.length){ return renderResult(); }
    var it=quiz[idx], answered=false;
    var choices=shuffle([it.a].concat(it.o));
    var pct=Math.round(idx/quiz.length*100);
    var html='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="q-top"><span>Question '+(idx+1)+' of '+quiz.length+'</span><span>Score '+score+'</span></div>'
      +(it.s?'<div class="q-figure">'+it.s+'</div>':'')+'<p class="q-text">'+esc(it.q)+'</p><div class="q-choices">';
    choices.forEach(function(c,i){ html+='<button type="button" class="q-choice" data-i="'+i+'"><span class="q-key">'+(i+1)+'</span>'+esc(c)+'</button>'; });
    html+='</div><div id="qFoot"></div>';
    card.innerHTML=html;
    var btns=card.querySelectorAll('.q-choice');
    Array.prototype.forEach.call(btns,function(b){
      b.addEventListener('click',function(){
        if(answered) return; answered=true;
        var chosen=choices[+b.getAttribute('data-i')], ok=(chosen===it.a);
        if(ok) score++;
        log.push({it:it,chosen:chosen,ok:ok});
        recordStat(it,ok);
        Array.prototype.forEach.call(btns,function(x){
          x.disabled=true;
          var cv=choices[+x.getAttribute('data-i')];
          if(cv===it.a) x.classList.add('correct');
          else if(x===b) x.classList.add('wrong');
        });
        var foot=document.getElementById('qFoot');
        foot.innerHTML='<div class="q-explain">'+(ok?'<b style="color:#1e7a3c">Correct.</b> ':'<b style="color:#b22a28">Not quite.</b> ')
          +esc(it.x)+' <a href="'+it.f+'">Open the '+esc(it.t)+' explorer →</a></div>'
          +'<button type="button" class="q-next" id="qNext">'+(idx+1>=quiz.length?'See results':'Next question')+'</button>';
        document.getElementById('qNext').addEventListener('click',function(){ idx++; renderQ(); });
      });
    });
  }

  function renderResult(){
    var pct=Math.round(score/quiz.length*100);
    var best=0; try{ best=parseInt(localStorage.getItem(BK)||'0',10)||0; }catch(e){}
    // a short retry round shouldn't be able to set a "best round" record
    if(!retry && pct>best){ best=pct; try{ localStorage.setItem(BK,String(best)); }catch(e){} try{ window.dispatchEvent(new CustomEvent('gp:quizchange')); }catch(e){} }
    var msg = pct===100?"Perfect score! ⭐" : pct>=80?"Great work." : pct>=50?"Nice — keep going." : "Worth another round.";
    var missed=log.filter(function(l){ return !l.ok; });

    var h='<div class="q-result">'
      +'<div class="q-top" style="justify-content:center">'+(retry?'Retry complete':'Round complete')+'</div>'
      +'<div class="q-score">'+score+' / '+quiz.length+'</div>'
      +'<p class="q-msg">'+msg+' ('+pct+'%)</p>'
      +'<p class="q-best">Best round so far: '+best+'%</p>'
      +'<div class="q-actions">'
      +(missed.length?'<button type="button" class="q-next" id="qRetry">Practice these '+missed.length+' again</button>':'')
      +'<button type="button" class="'+(missed.length?'q-ghost':'q-next')+'" id="qAgain">New round</button>'
      +'<a class="q-ghost" href="index.html">Browse explorers</a></div></div>';

    if(missed.length){
      h+='<div class="review-h">Review — '+missed.length+' to revisit</div>';
      missed.forEach(function(l){
        h+='<div class="review-item">'
          +(l.it.s?'<div class="q-figure">'+l.it.s+'</div>':'')
          +'<p class="review-q">'+esc(l.it.q)+'</p>'
          +'<p class="review-a"><span class="bad">Your answer: '+esc(l.chosen)+'</span></p>'
          +'<p class="review-a"><span class="good">Correct: '+esc(l.it.a)+'</span></p>'
          +'<p class="review-x">'+esc(l.it.x)+' <a href="'+l.it.f+'">Open the '+esc(l.it.t)+' explorer →</a></p>'
          +'</div>';
      });
    } else {
      h+='<div class="review-item ok"><p class="review-q">You didn’t miss a single one — nothing to review. ⭐</p></div>';
    }
    card.innerHTML=h;
    document.getElementById('qAgain').addEventListener('click',renderStart);
    var rb=document.getElementById('qRetry');
    if(rb) rb.addEventListener('click',function(){
      startRetry(missed.map(function(l){ return l.it; }));
    });
  }

  // keyboard: 1-4 to answer, Enter for the next question
  document.addEventListener('keydown',function(e){
    if(e.ctrlKey||e.metaKey||e.altKey) return;
    var tag=(e.target&&e.target.tagName)||'';
    if(/^(INPUT|TEXTAREA|SELECT)$/.test(tag)) return;
    if(e.key>='1'&&e.key<='4'){
      var btns=card.querySelectorAll('.q-choice');
      var b=btns[parseInt(e.key,10)-1];
      if(b&&!b.disabled){ b.click(); e.preventDefault(); }
    } else if(e.key==='Enter'){
      var nx=document.getElementById('qNext'); if(nx){ nx.click(); e.preventDefault(); }
    }
  });

  renderStart();
})();
</script>
