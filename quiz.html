<style>
  *{box-sizing:border-box;}

  .q-ghost{display:inline-block;text-decoration:none;background:#ffffff;color:#1a1a1a;border:1px solid #d8d8d8;font-weight:600;font-size:14px;padding:10px 18px;border-radius:999px;cursor:pointer;font-family:inherit;}
  .q-ghost:hover{border-color:#1a1a1a;}

  .start-btn{margin-top:6px;width:100%;background:#1a1a1a;color:#ffffff;border:none;font-weight:700;font-size:16px;padding:13px 22px;border-radius:12px;cursor:pointer;font-family:inherit;}

  .review-x{font-size:13px;color:#555555;margin:2px 0 0;}
  .review-x a{color:#185FA5;font-weight:600;text-decoration:none;}

<script>
(function(){
  // c = category: triangle | circle | angle | quad | polygon | transform ; d = Easy | Medium | Hard
  var BANK=[
    {"q":"In any triangle, the three interior angles add up to:","a":"180°","o":["360°","90°","It depends on the triangle"],"x":"The interior angles of every triangle total exactly 180°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"triangle","d":"Easy"},
    {"q":"An exterior angle of a triangle equals:","a":"the sum of the two remote interior angles","o":["the adjacent interior angle","always 90°","half the opposite angle"],"x":"Each exterior angle equals the sum of the two interior angles not next to it.","f":"ExteriorAngle-Visual.html","t":"Exterior Angle Theorem","c":"triangle","d":"Easy"},
    {"q":"An inscribed angle is ___ the central angle subtending the same arc.","a":"half","o":["twice","equal to","one third of"],"x":"The central angle is always exactly twice any inscribed angle on the same arc.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Medium"},
    {"q":"For a right triangle with legs a, b and hypotenuse c:","a":"a² + b² = c²","o":["a + b = c","a² + b² = 2c²","a·b = c²"],"x":"The Pythagorean theorem: the squares of the legs sum to the square of the hypotenuse.","f":"GeoProof-Visual.html","t":"Pythagorean Theorem","c":"triangle","d":"Easy"},
    {"q":"The centroid divides each median in the ratio (vertex : midpoint):","a":"2 : 1","o":["1 : 1","3 : 1","1 : 2"],"x":"The centroid sits two-thirds of the way along each median from the vertex.","f":"CentroidMedians-Visual.html","t":"Centroid & the 2:1 Median","c":"triangle","d":"Medium"},
    {"q":"The circumcenter of a triangle is equidistant from its:","a":"three vertices","o":["three sides","two longest sides","side midpoints only"],"x":"The circumcenter is the same distance R from all three vertices.","f":"Circumcircle-Visual.html","t":"Circumcenter & Circumcircle","c":"triangle","d":"Medium"},
    {"q":"The incenter of a triangle is equidistant from its:","a":"three sides","o":["three vertices","two vertices","circumcircle"],"x":"The incenter is the same distance r from all three sides — the inradius.","f":"Incircle-Visual.html","t":"Incenter & Incircle","c":"triangle","d":"Medium"},
    {"q":"The orthocenter is where a triangle's three ___ meet.","a":"altitudes","o":["medians","angle bisectors","perpendicular bisectors of the sides"],"x":"The three altitudes (vertex ⟂ opposite side) are concurrent at the orthocenter.","f":"Orthocenter-Visual.html","t":"Orthocenter","c":"triangle","d":"Medium"},
    {"q":"On the Euler line, the circumcenter O, centroid G and orthocenter H satisfy OG : GH =","a":"1 : 2","o":["1 : 1","2 : 1","1 : 3"],"x":"G lies one-third of the way from O to H, so OG : GH = 1 : 2.","f":"EulerLine-Visual.html","t":"Euler Line","c":"triangle","d":"Hard"},
    {"q":"The nine-point circle's radius is:","a":"half the circumradius","o":["equal to the circumradius","twice the inradius","equal to the inradius"],"x":"The nine-point circle has radius R/2, where R is the circumradius.","f":"NinePointCircle-Visual.html","t":"Nine-Point Circle","c":"triangle","d":"Hard"},
    {"q":"A triangle's midsegment (joining two side midpoints) is parallel to the third side and:","a":"half its length","o":["equal to it","twice its length","one third of it"],"x":"Each midsegment is parallel to a side and exactly half as long.","f":"Midsegment-Visual.html","t":"Triangle Midsegment","c":"triangle","d":"Easy"},
    {"q":"Heron's formula finds a triangle's area from its:","a":"three side lengths","o":["three angles","circumradius only","one side and the height"],"x":"Area = √(s(s−a)(s−b)(s−c)), using only the side lengths.","f":"Heron-Visual.html","t":"Heron's Formula","c":"triangle","d":"Medium"},
    {"q":"The area of a triangle with sides a, b and included angle C is:","a":"½·a·b·sin C","o":["½·a·b·cos C","a·b·sin C","½·a·b·tan C"],"x":"Area = ½·a·b·sin C — two sides times the sine of the angle between them, halved.","f":"TriangleAreaSine-Visual.html","t":"Area from Two Sides & the Angle","c":"triangle","d":"Medium"},
    {"q":"The Law of Sines says a / sin A equals:","a":"2R (the circumdiameter)","o":["R (the circumradius)","the area","the perimeter"],"x":"a/sin A = b/sin B = c/sin C = 2R, the diameter of the circumscribed circle.","f":"LawOfSinesCircumradius-Visual.html","t":"Law of Sines & Circumradius","c":"triangle","d":"Medium"},
    {"q":"The Law of Cosines becomes the Pythagorean theorem when the angle is:","a":"90°","o":["0°","60°","45°"],"x":"cos(90°) = 0, so the correction term vanishes and a² + b² = c².","f":"LawOfCosines-Visual.html","t":"Law of Cosines","c":"triangle","d":"Medium"},
    {"q":"A triangle's area also equals abc divided by:","a":"4R (four times the circumradius)","o":["2R","the inradius","the semiperimeter"],"x":"Area = abc / (4R), linking the sides to the circumradius R.","f":"AreaCircumradius-Visual.html","t":"Area = abc / (4R)","c":"triangle","d":"Hard"},
    {"q":"A triangle's area equals the inradius r times:","a":"the semiperimeter s","o":["the perimeter","the longest side","the circumradius"],"x":"Area = r·s, where s = (a+b+c)/2 is the semiperimeter.","f":"AreaInradius-Visual.html","t":"Area = Inradius × Semiperimeter","c":"triangle","d":"Hard"},
    {"q":"In a right triangle, the median from the right angle to the hypotenuse equals:","a":"half the hypotenuse","o":["the hypotenuse","the shorter leg","one third of the hypotenuse"],"x":"The midpoint of the hypotenuse is equidistant from all three vertices, so the median is half the hypotenuse.","f":"RightMedian-Visual.html","t":"Median to the Hypotenuse","c":"triangle","d":"Medium"},
    {"q":"In a right triangle, the altitude to the hypotenuse is the geometric mean of:","a":"the two hypotenuse segments it creates","o":["the two legs","the hypotenuse and a leg","the three sides"],"x":"h = √(p·q): the altitude is the geometric mean of the two pieces p and q of the hypotenuse.","f":"GeometricMean-Visual.html","t":"Geometric Mean Theorem","c":"triangle","d":"Hard"},
    {"q":"An angle bisector from a vertex splits the opposite side in the ratio of:","a":"the two sides meeting at that vertex","o":["1 : 1","the two opposite angles","2 : 1"],"x":"The bisector of ∠A meets BC at D with BD/DC = AB/AC.","f":"AngleBisector-Visual.html","t":"Angle Bisector Theorem","c":"triangle","d":"Medium"},
    {"q":"A line drawn parallel to one side of a triangle divides the other two sides:","a":"in equal ratios","o":["into equal lengths","perpendicularly","at their midpoints only"],"x":"The basic proportionality (Thales' intercept) theorem: AD/DB = AE/EC.","f":"BasicProportionality-Visual.html","t":"Basic Proportionality","c":"triangle","d":"Medium"},
    {"q":"Two triangles are similar if they share:","a":"two equal angles (AA)","o":["one equal angle","one equal side","equal perimeters"],"x":"Two equal angles force the third to match, making the triangles the same shape.","f":"AASimilarity-Visual.html","t":"AA Similarity","c":"triangle","d":"Easy"},
    {"q":"Euler's inequality relates the circumradius R and inradius r by:","a":"R ≥ 2r","o":["R ≤ 2r","R = r","R ≥ r⁄2"],"x":"From OI² = R² − 2Rr ≥ 0, the circumradius is at least twice the inradius.","f":"EulerInequality-Visual.html","t":"Euler's Inequality","c":"triangle","d":"Hard"},
    {"q":"Ceva's theorem says three cevians are concurrent exactly when the product of the three side ratios equals:","a":"1","o":["−1","0","the area"],"x":"(BD/DC)·(CE/EA)·(AF/FB) = 1 is the condition for concurrency.","f":"Ceva-Visual.html","t":"Ceva's Theorem","c":"triangle","d":"Hard"},
    {"q":"Menelaus' theorem tests three points for being:","a":"collinear","o":["concurrent","concyclic","equidistant"],"x":"When the transversal's three side-ratios multiply to 1 (signed −1), the points are collinear.","f":"Menelaus-Visual.html","t":"Menelaus' Theorem","c":"triangle","d":"Hard"},
    {"q":"Stewart's theorem gives the length of a triangle's:","a":"cevian","o":["altitude only","circumradius","angle bisector only"],"x":"b²m + c²n = a(d² + mn) gives any cevian's length d.","f":"Stewart-Visual.html","t":"Stewart's Theorem","c":"triangle","d":"Hard"},
    {"q":"Morley's theorem says the intersections of adjacent angle trisectors form:","a":"an equilateral triangle","o":["a right triangle","a similar triangle","the medial triangle"],"x":"For any triangle, the three trisector intersections make a perfect equilateral triangle.","f":"Morley-Visual.html","t":"Morley's Trisector Theorem","c":"triangle","d":"Hard"},
    {"q":"Napoleon's theorem: erect equilateral triangles on each side; their centers form:","a":"an equilateral triangle","o":["the original triangle","a right triangle","a straight line"],"x":"The three centers always form an equilateral triangle, however lopsided the original.","f":"Napoleon-Visual.html","t":"Napoleon's Theorem","c":"triangle","d":"Hard"},
    {"q":"Carnot's theorem: the signed distances from the circumcenter to the three sides sum to:","a":"R + r","o":["R − r","2R","R·r"],"x":"The three signed perpendiculars add to the circumradius plus the inradius.","f":"CarnotTheorem-Visual.html","t":"Carnot's Theorem","c":"triangle","d":"Hard"},
    {"q":"The feet of perpendiculars from a point on the circumcircle to the three sides are:","a":"collinear (the Simson line)","o":["the vertices","concurrent","a smaller triangle"],"x":"For a point on the circumcircle, the three feet line up on the Simson line.","f":"SimsonLine-Visual.html","t":"Simson Line","c":"triangle","d":"Hard"},
    {"q":"In an equilateral triangle, the distances from any interior point to the three sides sum to:","a":"the triangle's height","o":["the perimeter","one side length","zero"],"x":"Viviani's theorem: that sum always equals the altitude, wherever the point is.","f":"Viviani-Visual.html","t":"Viviani's Theorem","c":"triangle","d":"Medium"},
    {"q":"A tangent to a circle meets the radius at the point of contact at:","a":"90°","o":["45°","0° (they're parallel)","60°"],"x":"The radius to the point of tangency is always perpendicular to the tangent.","f":"TangentRadius-Visual.html","t":"Tangent ⟂ Radius","c":"circle","d":"Easy"},
    {"q":"The two tangent segments from an external point to a circle are:","a":"equal in length","o":["perpendicular","parallel","always equal to the radius"],"x":"From any outside point the two tangents have the same length, √(OP²−R²).","f":"EqualTangents-Visual.html","t":"Equal Tangents","c":"circle","d":"Medium"},
    {"q":"A perpendicular dropped from a circle's center to a chord:","a":"bisects the chord","o":["is longer than the radius","equals the chord","meets it at 60°"],"x":"The perpendicular from the center always strikes a chord at its midpoint.","f":"ChordBisector-Visual.html","t":"Perpendicular Bisects a Chord","c":"circle","d":"Medium"},
    {"q":"Two chords of a circle are equal in length exactly when they are:","a":"the same distance from the center","o":["parallel","perpendicular","on the same side"],"x":"Equal chords are equidistant from the center; the closer a chord, the longer it is.","f":"EqualChords-Visual.html","t":"Equal Chords, Equal Distances","c":"circle","d":"Medium"},
    {"q":"For two chords crossing at P, the Power of a Point says:","a":"PA · PB = PC · PD","o":["PA + PB = PC + PD","PA · PC = PB · PD","PA / PB = PC / PD"],"x":"The product of the two distances along each line through P is the same.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Hard"},
    {"q":"Two chords cross inside a circle. The angle between them equals:","a":"half the sum of the two intercepted arcs","o":["half the difference of the arcs","the larger arc","half of one arc"],"x":"Vertex inside: the angle is ½(arc AB + arc CD).","f":"IntersectingChordsAngle-Visual.html","t":"Intersecting Chords Angle","c":"circle","d":"Hard"},
    {"q":"An angle formed by two secants from a point outside a circle equals:","a":"half the difference of the intercepted arcs","o":["half the sum of the arcs","the far arc","half the near arc"],"x":"Vertex outside: the angle is ½(far arc − near arc).","f":"SecantsAngle-Visual.html","t":"Intersecting Secants Angle","c":"circle","d":"Hard"},
    {"q":"The tangent-chord angle equals:","a":"the inscribed angle in the alternate segment","o":["the central angle","a right angle","the whole arc"],"x":"Both equal half the intercepted arc — the 'alternate segment' theorem.","f":"TangentChordAngle-Visual.html","t":"Tangent-Chord Angle","c":"circle","d":"Hard"},
    {"q":"The angle between two tangents from an external point and the central angle of the near arc are:","a":"supplementary (sum to 180°)","o":["equal","complementary","both right angles"],"x":"OAPB is a kite with two right angles, so ∠APB + ∠AOB = 180°.","f":"TangentTangentAngle-Visual.html","t":"Tangent-Tangent Angle","c":"circle","d":"Hard"},
    {"q":"A triangle inscribed in a semicircle (one side a diameter) has:","a":"a right angle at the third vertex","o":["all angles equal","an obtuse angle","no special property"],"x":"Thales' theorem: an angle inscribed in a semicircle is exactly 90°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle (Thales)","c":"circle","d":"Easy"},
    {"q":"An arc that is one quarter of a circle (90°) has length:","a":"one quarter of the circumference","o":["one quarter of the radius","half the circumference","equal to the radius"],"x":"Arc length = (θ/360)·2πr, so a 90° arc is a quarter of 2πr.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"Vertical (opposite) angles formed by two crossing lines are:","a":"equal","o":["supplementary","complementary","always right angles"],"x":"Opposite angles at an intersection are always equal; neighbours are supplementary.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Easy"},
    {"q":"The angles around a single point add up to:","a":"360°","o":["180°","90°","270°"],"x":"Going once around a point is a full turn — 360°.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Easy"},
    {"q":"When a transversal crosses two parallel lines, alternate interior angles are:","a":"equal","o":["supplementary","complementary","unrelated"],"x":"Parallel lines give equal alternate interior angles (and equal corresponding angles).","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & a Transversal","c":"angle","d":"Easy"},
    {"q":"Co-interior (same-side interior) angles on a transversal between parallel lines:","a":"sum to 180°","o":["are equal","sum to 90°","sum to 360°"],"x":"Co-interior angles are supplementary when the lines are parallel.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & a Transversal","c":"angle","d":"Medium"},
    {"q":"The diagonals of a parallelogram always:","a":"bisect each other","o":["are equal in length","are perpendicular","bisect the angles"],"x":"They cross at their common midpoint, so each diagonal is cut in half.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect Each Other","c":"quad","d":"Easy"},
    {"q":"The diagonals of a rhombus are always:","a":"perpendicular","o":["equal in length","parallel","cut into unequal halves"],"x":"Equal sides force the diagonals to cross at right angles (and bisect each other).","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Medium"},
    {"q":"The parallelogram law states AC² + BD² (the diagonals) equals:","a":"2(a² + b²)","o":["a² + b²","4ab","(a + b)²"],"x":"The sum of the squares of the diagonals is twice the sum of the squares of two adjacent sides.","f":"ParallelogramLaw-Visual.html","t":"Parallelogram Law","c":"quad","d":"Hard"},
    {"q":"Joining the midpoints of any quadrilateral's sides always forms:","a":"a parallelogram","o":["a rectangle","a rhombus","a smaller copy"],"x":"Varignon's theorem: the midpoint figure is always a parallelogram.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Medium"},
    {"q":"In a cyclic quadrilateral, each pair of opposite angles sums to:","a":"180°","o":["90°","360°","270°"],"x":"Opposite angles of a quadrilateral inscribed in a circle are supplementary.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium"},
    {"q":"Ptolemy's theorem says the product of a cyclic quadrilateral's diagonals equals:","a":"the sum of the products of opposite sides","o":["the perimeter","the area","the sum of the four sides"],"x":"AC·BD = AB·CD + AD·BC for a quadrilateral inscribed in a circle.","f":"Ptolemy-Visual.html","t":"Ptolemy's Theorem","c":"quad","d":"Hard"},
    {"q":"Brahmagupta's formula gives the area of a cyclic quadrilateral from:","a":"its four side lengths","o":["its two diagonals","its angles","one side and the radius"],"x":"Area = √((s−a)(s−b)(s−c)(s−d)) — the cyclic-quad cousin of Heron's formula.","f":"Brahmagupta-Visual.html","t":"Brahmagupta's Formula","c":"quad","d":"Hard"},
    {"q":"In a tangential quadrilateral (one with an inscribed circle), Pitot's theorem says:","a":"AB + CD = BC + DA","o":["AB + BC = CD + DA","all sides are equal","the diagonals are equal"],"x":"The two pairs of opposite sides have equal sums when a circle fits inside.","f":"Pitot-Visual.html","t":"Pitot's Theorem","c":"quad","d":"Hard"},
    {"q":"The British Flag Theorem (rectangle, any point P) states:","a":"PA² + PC² = PB² + PD²","o":["PA + PC = PB + PD","PA · PC = PB · PD","PA² + PB² = PC² + PD²"],"x":"Squared distances to opposite corners of a rectangle are balanced.","f":"BritishFlag-Visual.html","t":"British Flag Theorem","c":"quad","d":"Hard"},
    {"q":"A trapezoid's midsegment (joining the leg midpoints) equals:","a":"the average of the two parallel sides","o":["the longer base","half the longer base","the sum of the bases"],"x":"MN = (AB + DC)/2, and it's parallel to both bases.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Medium"},

    {"q":"The two horizontal lines are parallel. The marked angles are alternate interior angles. Find x.","a":"70°","o":["110°","90°","85°"],"x":"Alternate interior angles are equal, so x = 70°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & a Transversal","c":"angle","d":"Hard","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\"><line x1=\"28\" y1=\"48\" x2=\"272\" y2=\"48\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"28\" y1=\"125\" x2=\"272\" y2=\"125\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"266\" y=\"44\" font-size=\"14\" fill=\"#1a1a1a\">›</text><text x=\"266\" y=\"121\" font-size=\"14\" fill=\"#1a1a1a\">›</text><line x1=\"95\" y1=\"20\" x2=\"210\" y2=\"160\" stroke=\"#BA7517\" stroke-width=\"2\"/><text x=\"102\" y=\"66\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">70°</text><text x=\"189\" y=\"119\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The two horizontal lines are parallel. The marked angles are corresponding angles. Find x.","a":"125°","o":["55°","90°","140°"],"x":"Corresponding angles are equal, so x = 125°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & a Transversal","c":"angle","d":"Hard","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\"><line x1=\"28\" y1=\"48\" x2=\"272\" y2=\"48\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"28\" y1=\"125\" x2=\"272\" y2=\"125\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"266\" y=\"44\" font-size=\"14\" fill=\"#1a1a1a\">›</text><text x=\"266\" y=\"121\" font-size=\"14\" fill=\"#1a1a1a\">›</text><line x1=\"95\" y1=\"20\" x2=\"210\" y2=\"160\" stroke=\"#BA7517\" stroke-width=\"2\"/><text x=\"102\" y=\"66\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">125°</text><text x=\"189\" y=\"119\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The two horizontal lines are parallel. The marked angles are co-interior (same-side interior) angles. Find x.","a":"70°","o":["110°","90°","85°"],"x":"Co-interior angles are supplementary: x = 180 − 110 = 70°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & a Transversal","c":"angle","d":"Hard","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\"><line x1=\"28\" y1=\"48\" x2=\"272\" y2=\"48\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"28\" y1=\"125\" x2=\"272\" y2=\"125\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"266\" y=\"44\" font-size=\"14\" fill=\"#1a1a1a\">›</text><text x=\"266\" y=\"121\" font-size=\"14\" fill=\"#1a1a1a\">›</text><line x1=\"95\" y1=\"20\" x2=\"210\" y2=\"160\" stroke=\"#BA7517\" stroke-width=\"2\"/><text x=\"102\" y=\"66\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">110°</text><text x=\"189\" y=\"119\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The triangle is isosceles (equal sides marked). Each base angle is 50°. Find the apex angle x.","a":"80°","o":["50°","100°","90°"],"x":"Angles sum to 180°: x = 180 − 2·50 = 80°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Medium","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\"><polygon points=\"70,150 230,150 150,30\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"106\" y1=\"87\" x2=\"114\" y2=\"93\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><line x1=\"186\" y1=\"93\" x2=\"194\" y2=\"87\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><text x=\"88\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">50°</text><text x=\"200\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">50°</text><text x=\"150\" y=\"54\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\" text-anchor=\"middle\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The triangle is isosceles (equal sides marked). Each base angle is 72°. Find the apex angle x.","a":"36°","o":["72°","144°","46°"],"x":"Angles sum to 180°: x = 180 − 2·72 = 36°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Medium","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\"><polygon points=\"70,150 230,150 150,30\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"106\" y1=\"87\" x2=\"114\" y2=\"93\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><line x1=\"186\" y1=\"93\" x2=\"194\" y2=\"87\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><text x=\"88\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">72°</text><text x=\"200\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">72°</text><text x=\"150\" y=\"54\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\" text-anchor=\"middle\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The triangle is isosceles (equal sides marked). Each base angle is 66°. Find the apex angle x.","a":"48°","o":["66°","132°","58°"],"x":"Angles sum to 180°: x = 180 − 2·66 = 48°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Medium","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\"><polygon points=\"70,150 230,150 150,30\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"106\" y1=\"87\" x2=\"114\" y2=\"93\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><line x1=\"186\" y1=\"93\" x2=\"194\" y2=\"87\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><text x=\"88\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">66°</text><text x=\"200\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">66°</text><text x=\"150\" y=\"54\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\" text-anchor=\"middle\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"ABCD is a cyclic quadrilateral with ∠A = 70°. Find the opposite angle x = ∠C.","a":"110°","o":["70°","290°","120°"],"x":"Opposite angles of a cyclic quadrilateral are supplementary: x = 180 − 70 = 110°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium","s":"<svg viewBox=\"0 0 300 190\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"150\" cy=\"95\" r=\"72\" fill=\"none\" stroke=\"#c9c9cf\" stroke-width=\"1.5\"/><polygon points=\"88,59 186,33 205,141 114,157\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"82\" y=\"59\" font-size=\"13\" font-weight=\"700\" fill=\"#185FA5\" text-anchor=\"end\">70°</text><text x=\"211\" y=\"145\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"82\" y=\"45\" font-size=\"11\" fill=\"#666\" text-anchor=\"end\">A</text><text x=\"211\" y=\"159\" font-size=\"11\" fill=\"#666\">C</text><text x=\"296\" y=\"186\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"ABCD is a cyclic quadrilateral with ∠A = 100°. Find the opposite angle x = ∠C.","a":"80°","o":["100°","260°","90°"],"x":"Opposite angles of a cyclic quadrilateral are supplementary: x = 180 − 100 = 80°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium","s":"<svg viewBox=\"0 0 300 190\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"150\" cy=\"95\" r=\"72\" fill=\"none\" stroke=\"#c9c9cf\" stroke-width=\"1.5\"/><polygon points=\"88,59 186,33 205,141 114,157\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"82\" y=\"59\" font-size=\"13\" font-weight=\"700\" fill=\"#185FA5\" text-anchor=\"end\">100°</text><text x=\"211\" y=\"145\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"82\" y=\"45\" font-size=\"11\" fill=\"#666\" text-anchor=\"end\">A</text><text x=\"211\" y=\"159\" font-size=\"11\" fill=\"#666\">C</text><text x=\"296\" y=\"186\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"ABCD is a cyclic quadrilateral with ∠A = 115°. Find the opposite angle x = ∠C.","a":"65°","o":["115°","245°","75°"],"x":"Opposite angles of a cyclic quadrilateral are supplementary: x = 180 − 115 = 65°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium","s":"<svg viewBox=\"0 0 300 190\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"150\" cy=\"95\" r=\"72\" fill=\"none\" stroke=\"#c9c9cf\" stroke-width=\"1.5\"/><polygon points=\"88,59 186,33 205,141 114,157\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"82\" y=\"59\" font-size=\"13\" font-weight=\"700\" fill=\"#185FA5\" text-anchor=\"end\">115°</text><text x=\"211\" y=\"145\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"82\" y=\"45\" font-size=\"11\" fill=\"#666\" text-anchor=\"end\">A</text><text x=\"211\" y=\"159\" font-size=\"11\" fill=\"#666\">C</text><text x=\"296\" y=\"186\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"}
  ];

  var CATS=[['all','All topics'],['triangle','Triangles'],['circle','Circles'],['angle','Angles'],['quad','Quadrilaterals'],['polygon','Polygons'],['transform','Transformations']];
  var DIFFS=[['all','All levels'],['Easy','Easy'],['Medium','Medium'],['Hard','Hard']];
  var LENS=[[10,'10'],[20,'20'],[0,'All']];
  var BK='gp:quizbestpct';
  var sel={cat:'all',diff:'all',len:10};

  var card=document.getElementById('quizCard');
  var quiz, idx, score, log;

  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function pool(){ return BANK.filter(function(it){ return (sel.cat==='all'||it.c===sel.cat) && (sel.diff==='all'||it.d===sel.diff); }); }

  function chipRow(label,items,curVal,onName){
    var h='<div class="setup-row"><div class="setup-label">'+label+'</div><div class="chips">';
    items.forEach(function(p){ h+='<button type="button" class="chip'+(p[0]===curVal?' active':'')+'" data-act="'+onName+'" data-v="'+p[0]+'">'+esc(p[1])+'</button>'; });
    return h+'</div></div>';
  }

  function renderStart(){
    var n=pool().length;
    var h=chipRow('Topic',CATS,sel.cat,'cat')
      +chipRow('Difficulty',DIFFS,sel.diff,'diff')
      +chipRow('Questions per round',LENS,sel.len,'len')
      +'<button type="button" class="start-btn" id="startBtn"'+(n===0?' disabled':'')+'>'
      +(n===0?'No questions match — widen your filters':'Start round ('+Math.min(sel.len||n,n)+' question'+((Math.min(sel.len||n,n))===1?'':'s')+')')
      +'</button>';
    card.innerHTML=h;
    Array.prototype.forEach.call(card.querySelectorAll('.chip'),function(b){
      b.addEventListener('click',function(){
        var act=b.getAttribute('data-act'), v=b.getAttribute('data-v');
        if(act==='len') sel.len=parseInt(v,10); else sel[act]=v;
        renderStart();
      });
    });
    var sb=document.getElementById('startBtn');
    if(sb && n>0) sb.addEventListener('click',start);
  }

  function start(){
    var p=shuffle(pool().slice());
    var n=sel.len===0?p.length:Math.min(sel.len,p.length);
    quiz=p.slice(0,n); idx=0; score=0; log=[];
    renderQ();
  }

  function renderQ(){
    if(idx>=quiz.length){ return renderResult(); }
    var it=quiz[idx], answered=false;
    var choices=shuffle([it.a].concat(it.o));
    var pct=Math.round(idx/quiz.length*100);
    var html='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="q-top"><span>Question '+(idx+1)+' of '+quiz.length+'</span><span>Score '+score+'</span></div>'
      +(it.s?'<div class="q-figure">'+it.s+'</div>':'')+'<p class="q-text">'+esc(it.q)+'</p><div class="q-choices">';
    choices.forEach(function(c,i){ html+='<button type="button" class="q-choice" data-i="'+i+'">'+esc(c)+'</button>'; });
    html+='</div><div id="qFoot"></div>';
    card.innerHTML=html;
    var btns=card.querySelectorAll('.q-choice');
    Array.prototype.forEach.call(btns,function(b){
      b.addEventListener('click',function(){
        if(answered) return; answered=true;
        var chosen=choices[+b.getAttribute('data-i')], ok=(chosen===it.a);
        if(ok) score++;
        log.push({it:it,chosen:chosen,ok:ok});
        Array.prototype.forEach.call(btns,function(x){
          x.disabled=true;
          var cv=choices[+x.getAttribute('data-i')];
          if(cv===it.a) x.classList.add('correct');
          else if(x===b) x.classList.add('wrong');
        });
        var foot=document.getElementById('qFoot');
        foot.innerHTML='<div class="q-explain">'+(ok?'<b style="color:#1e7a3c">Correct.</b> ':'<b style="color:#b22a28">Not quite.</b> ')
          +esc(it.x)+' <a href="'+it.f+'">Open the '+esc(it.t)+' explorer →</a></div>'
          +'<button type="button" class="q-next" id="qNext">'+(idx+1>=quiz.length?'See results':'Next question')+'</button>';
        document.getElementById('qNext').addEventListener('click',function(){ idx++; renderQ(); });
      });
    });
  }

  function renderResult(){
    var pct=Math.round(score/quiz.length*100);
    var best=0; try{ best=parseInt(localStorage.getItem(BK)||'0',10)||0; }catch(e){}
    if(pct>best){ best=pct; try{ localStorage.setItem(BK,String(best)); }catch(e){} try{ window.dispatchEvent(new CustomEvent('gp:quizchange')); }catch(e){} }
    var msg = pct===100?"Perfect score! ⭐" : pct>=80?"Great work." : pct>=50?"Nice — keep going." : "Worth another round.";
    var missed=log.filter(function(l){ return !l.ok; });

    var h='<div class="q-result">'
      +'<div class="q-top" style="justify-content:center">Round complete</div>'
      +'<div class="q-score">'+score+' / '+quiz.length+'</div>'
      +'<p class="q-msg">'+msg+' ('+pct+'%)</p>'
      +'<p class="q-best">Best round so far: '+best+'%</p>'
      +'<div class="q-actions"><button type="button" class="q-next" id="qAgain">New round</button>'
      +'<a class="q-ghost" href="index.html">Browse explorers</a></div></div>';

    if(missed.length){
      h+='<div class="review-h">Review — '+missed.length+' to revisit</div>';
      missed.forEach(function(l){
        h+='<div class="review-item">'
          +(l.it.s?'<div class="q-figure">'+l.it.s+'</div>':'')
          +'<p class="review-q">'+esc(l.it.q)+'</p>'
          +'<p class="review-a"><span class="bad">Your answer: '+esc(l.chosen)+'</span></p>'
          +'<p class="review-a"><span class="good">Correct: '+esc(l.it.a)+'</span></p>'
          +'<p class="review-x">'+esc(l.it.x)+' <a href="'+l.it.f+'">Open the '+esc(l.it.t)+' explorer →</a></p>'
          +'</div>';
      });
    } else {
      h+='<div class="review-item ok"><p class="review-q">You didn’t miss a single one — nothing to review. ⭐</p></div>';
    }
    card.innerHTML=h;
    document.getElementById('qAgain').addEventListener('click',renderStart);
  }

  renderStart();
})();
</script>
