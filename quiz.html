<style>
  *{box-sizing:border-box;}

  .q-result{text-align:center;padding:6px 0;}

  .q-ghost:hover{border-color:#1a1a1a;}

<script>
(function(){
  // c = category: triangle | circle | angle | quad | polygon | transform ; d = Easy | Medium | Hard
  var BANK=[
    {"q":"In any triangle, the three interior angles add up to:","a":"180°","o":["360°","90°","It depends on the triangle"],"x":"The interior angles of every triangle total exactly 180°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"triangle","d":"Easy"},
    {"q":"An exterior angle of a triangle equals:","a":"the sum of the two remote interior angles","o":["the adjacent interior angle","always 90°","half the opposite angle"],"x":"Each exterior angle equals the sum of the two interior angles not next to it.","f":"ExteriorAngle-Visual.html","t":"Exterior Angle Theorem","c":"triangle","d":"Easy"},
    {"q":"An inscribed angle is ___ the central angle subtending the same arc.","a":"half","o":["twice","equal to","one third of"],"x":"The central angle is always exactly twice any inscribed angle on the same arc.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Medium"},
    {"q":"For a right triangle with legs a, b and hypotenuse c:","a":"a² + b² = c²","o":["a + b = c","a² + b² = 2c²","a·b = c²"],"x":"The Pythagorean theorem: the squares of the legs sum to the square of the hypotenuse.","f":"GeoProof-Visual.html","t":"Pythagorean Theorem","c":"triangle","d":"Easy"},
    {"q":"The centroid divides each median in the ratio (vertex : midpoint):","a":"2 : 1","o":["1 : 1","3 : 1","1 : 2"],"x":"The centroid sits two-thirds of the way along each median from the vertex.","f":"CentroidMedians-Visual.html","t":"Centroid & the 2:1 Median","c":"triangle","d":"Medium"},
    {"q":"The circumcenter of a triangle is equidistant from its:","a":"three vertices","o":["three sides","two longest sides","side midpoints only"],"x":"The circumcenter is the same distance R from all three vertices.","f":"Circumcircle-Visual.html","t":"Circumcenter & Circumcircle","c":"triangle","d":"Medium"},
    {"q":"The incenter of a triangle is equidistant from its:","a":"three sides","o":["three vertices","two vertices","circumcircle"],"x":"The incenter is the same distance r from all three sides — the inradius.","f":"Incircle-Visual.html","t":"Incenter & Incircle","c":"triangle","d":"Medium"},
    {"q":"The orthocenter is where a triangle's three ___ meet.","a":"altitudes","o":["medians","angle bisectors","perpendicular bisectors of the sides"],"x":"The three altitudes (vertex ⟂ opposite side) are concurrent at the orthocenter.","f":"Orthocenter-Visual.html","t":"Orthocenter","c":"triangle","d":"Medium"},
    {"q":"On the Euler line, the circumcenter O, centroid G and orthocenter H satisfy OG : GH =","a":"1 : 2","o":["1 : 1","2 : 1","1 : 3"],"x":"G lies one-third of the way from O to H, so OG : GH = 1 : 2.","f":"EulerLine-Visual.html","t":"Euler Line","c":"triangle","d":"Hard"},
    {"q":"The nine-point circle's radius is:","a":"half the circumradius","o":["equal to the circumradius","twice the inradius","equal to the inradius"],"x":"The nine-point circle has radius R/2, where R is the circumradius.","f":"NinePointCircle-Visual.html","t":"Nine-Point Circle","c":"triangle","d":"Hard"},
    {"q":"A triangle's midsegment (joining two side midpoints) is parallel to the third side and:","a":"half its length","o":["equal to it","twice its length","one third of it"],"x":"Each midsegment is parallel to a side and exactly half as long.","f":"Midsegment-Visual.html","t":"Triangle Midsegment","c":"triangle","d":"Easy"},
    {"q":"Heron's formula finds a triangle's area from its:","a":"three side lengths","o":["three angles","circumradius only","one side and the height"],"x":"Area = √(s(s−a)(s−b)(s−c)), using only the side lengths.","f":"Heron-Visual.html","t":"Heron's Formula","c":"triangle","d":"Medium"},
    {"q":"The area of a triangle with sides a, b and included angle C is:","a":"½·a·b·sin C","o":["½·a·b·cos C","a·b·sin C","½·a·b·tan C"],"x":"Area = ½·a·b·sin C — two sides times the sine of the angle between them, halved.","f":"TriangleAreaSine-Visual.html","t":"Triangle Area (sine)","c":"triangle","d":"Medium"},
    {"q":"The Law of Sines says a / sin A equals:","a":"2R (the circumdiameter)","o":["R (the circumradius)","the area","the perimeter"],"x":"a/sin A = b/sin B = c/sin C = 2R, the diameter of the circumscribed circle.","f":"LawOfSinesCircumradius-Visual.html","t":"Sine Rule & 2R","c":"triangle","d":"Medium"},
    {"q":"The Law of Cosines becomes the Pythagorean theorem when the angle is:","a":"90°","o":["0°","60°","45°"],"x":"cos(90°) = 0, so the correction term vanishes and a² + b² = c².","f":"LawOfCosines-Visual.html","t":"Law of Cosines","c":"triangle","d":"Medium"},
    {"q":"A triangle's area also equals abc divided by:","a":"4R (four times the circumradius)","o":["2R","the inradius","the semiperimeter"],"x":"Area = abc / (4R), linking the sides to the circumradius R.","f":"AreaCircumradius-Visual.html","t":"Area = abc/4R","c":"triangle","d":"Hard"},
    {"q":"A triangle's area equals the inradius r times:","a":"the semiperimeter s","o":["the perimeter","the longest side","the circumradius"],"x":"Area = r·s, where s = (a+b+c)/2 is the semiperimeter.","f":"AreaInradius-Visual.html","t":"Area = r·s","c":"triangle","d":"Hard"},
    {"q":"In a right triangle, the median from the right angle to the hypotenuse equals:","a":"half the hypotenuse","o":["the hypotenuse","the shorter leg","one third of the hypotenuse"],"x":"The midpoint of the hypotenuse is equidistant from all three vertices, so the median is half the hypotenuse.","f":"RightMedian-Visual.html","t":"Median to Hypotenuse","c":"triangle","d":"Medium"},
    {"q":"In a right triangle, the altitude to the hypotenuse is the geometric mean of:","a":"the two hypotenuse segments it creates","o":["the two legs","the hypotenuse and a leg","the three sides"],"x":"h = √(p·q): the altitude is the geometric mean of the two pieces p and q of the hypotenuse.","f":"GeometricMean-Visual.html","t":"Geometric Mean","c":"triangle","d":"Hard"},
    {"q":"An angle bisector from a vertex splits the opposite side in the ratio of:","a":"the two sides meeting at that vertex","o":["1 : 1","the two opposite angles","2 : 1"],"x":"The bisector of ∠A meets BC at D with BD/DC = AB/AC.","f":"AngleBisector-Visual.html","t":"Angle Bisector Theorem","c":"triangle","d":"Medium"},
    {"q":"A line drawn parallel to one side of a triangle divides the other two sides:","a":"in equal ratios","o":["into equal lengths","perpendicularly","at their midpoints only"],"x":"The basic proportionality (Thales' intercept) theorem: AD/DB = AE/EC.","f":"BasicProportionality-Visual.html","t":"Basic Proportionality","c":"triangle","d":"Medium"},
    {"q":"Two triangles are similar if they share:","a":"two equal angles (AA)","o":["one equal angle","one equal side","equal perimeters"],"x":"Two equal angles force the third to match, making the triangles the same shape.","f":"AASimilarity-Visual.html","t":"AA Similarity","c":"triangle","d":"Easy"},
    {"q":"Euler's inequality relates the circumradius R and inradius r by:","a":"R ≥ 2r","o":["R ≤ 2r","R = r","R ≥ r⁄2"],"x":"From OI² = R² − 2Rr ≥ 0, the circumradius is at least twice the inradius.","f":"EulerInequality-Visual.html","t":"Euler's Inequality","c":"triangle","d":"Hard"},
    {"q":"Ceva's theorem says three cevians are concurrent exactly when the product of the three side ratios equals:","a":"1","o":["−1","0","the area"],"x":"(BD/DC)·(CE/EA)·(AF/FB) = 1 is the condition for concurrency.","f":"Ceva-Visual.html","t":"Ceva's Theorem","c":"triangle","d":"Hard"},
    {"q":"Menelaus' theorem tests three points for being:","a":"collinear","o":["concurrent","concyclic","equidistant"],"x":"When the transversal's three side-ratios multiply to 1 (signed −1), the points are collinear.","f":"Menelaus-Visual.html","t":"Menelaus' Theorem","c":"triangle","d":"Hard"},
    {"q":"Stewart's theorem gives the length of a triangle's:","a":"cevian","o":["altitude only","circumradius","angle bisector only"],"x":"b²m + c²n = a(d² + mn) gives any cevian's length d.","f":"Stewart-Visual.html","t":"Stewart's Theorem","c":"triangle","d":"Hard"},
    {"q":"Morley's theorem says the intersections of adjacent angle trisectors form:","a":"an equilateral triangle","o":["a right triangle","a similar triangle","the medial triangle"],"x":"For any triangle, the three trisector intersections make a perfect equilateral triangle.","f":"Morley-Visual.html","t":"Morley's Trisector","c":"triangle","d":"Hard"},
    {"q":"Napoleon's theorem: erect equilateral triangles on each side; their centers form:","a":"an equilateral triangle","o":["the original triangle","a right triangle","a straight line"],"x":"The three centers always form an equilateral triangle, however lopsided the original.","f":"Napoleon-Visual.html","t":"Napoleon's Theorem","c":"triangle","d":"Hard"},
    {"q":"Carnot's theorem: the signed distances from the circumcenter to the three sides sum to:","a":"R + r","o":["R − r","2R","R·r"],"x":"The three signed perpendiculars add to the circumradius plus the inradius.","f":"CarnotTheorem-Visual.html","t":"Carnot's Theorem","c":"triangle","d":"Hard"},
    {"q":"The feet of perpendiculars from a point on the circumcircle to the three sides are:","a":"collinear (the Simson line)","o":["the vertices","concurrent","a smaller triangle"],"x":"For a point on the circumcircle, the three feet line up on the Simson line.","f":"SimsonLine-Visual.html","t":"Simson Line","c":"triangle","d":"Hard"},
    {"q":"In an equilateral triangle, the distances from any interior point to the three sides sum to:","a":"the triangle's height","o":["the perimeter","one side length","zero"],"x":"Viviani's theorem: that sum always equals the altitude, wherever the point is.","f":"Viviani-Visual.html","t":"Viviani's Theorem","c":"triangle","d":"Medium"},
    {"q":"A tangent to a circle meets the radius at the point of contact at:","a":"90°","o":["45°","0° (they're parallel)","60°"],"x":"The radius to the point of tangency is always perpendicular to the tangent.","f":"TangentRadius-Visual.html","t":"Tangent ⟂ Radius","c":"circle","d":"Easy"},
    {"q":"The two tangent segments from an external point to a circle are:","a":"equal in length","o":["perpendicular","parallel","always equal to the radius"],"x":"From any outside point the two tangents have the same length, √(OP²−R²).","f":"EqualTangents-Visual.html","t":"Equal Tangents","c":"circle","d":"Medium"},
    {"q":"A perpendicular dropped from a circle's center to a chord:","a":"bisects the chord","o":["is longer than the radius","equals the chord","meets it at 60°"],"x":"The perpendicular from the center always strikes a chord at its midpoint.","f":"ChordBisector-Visual.html","t":"Chord & Center","c":"circle","d":"Medium"},
    {"q":"Two chords of a circle are equal in length exactly when they are:","a":"the same distance from the center","o":["parallel","perpendicular","on the same side"],"x":"Equal chords are equidistant from the center; the closer a chord, the longer it is.","f":"EqualChords-Visual.html","t":"Equal Chords","c":"circle","d":"Medium"},
    {"q":"For two chords crossing at P, the Power of a Point says:","a":"PA · PB = PC · PD","o":["PA + PB = PC + PD","PA · PC = PB · PD","PA / PB = PC / PD"],"x":"The product of the two distances along each line through P is the same.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Hard"},
    {"q":"Two chords cross inside a circle. The angle between them equals:","a":"half the sum of the two intercepted arcs","o":["half the difference of the arcs","the larger arc","half of one arc"],"x":"Vertex inside: the angle is ½(arc AB + arc CD).","f":"IntersectingChordsAngle-Visual.html","t":"Intersecting Chords Angle","c":"circle","d":"Hard"},
    {"q":"An angle formed by two secants from a point outside a circle equals:","a":"half the difference of the intercepted arcs","o":["half the sum of the arcs","the far arc","half the near arc"],"x":"Vertex outside: the angle is ½(far arc − near arc).","f":"SecantsAngle-Visual.html","t":"Intersecting Secants Angle","c":"circle","d":"Hard"},
    {"q":"The tangent-chord angle equals:","a":"the inscribed angle in the alternate segment","o":["the central angle","a right angle","the whole arc"],"x":"Both equal half the intercepted arc — the 'alternate segment' theorem.","f":"TangentChordAngle-Visual.html","t":"Tangent–Chord Angle","c":"circle","d":"Hard"},
    {"q":"The angle between two tangents from an external point and the central angle of the near arc are:","a":"supplementary (sum to 180°)","o":["equal","complementary","both right angles"],"x":"OAPB is a kite with two right angles, so ∠APB + ∠AOB = 180°.","f":"TangentTangentAngle-Visual.html","t":"Tangent–Tangent Angle","c":"circle","d":"Hard"},
    {"q":"A triangle inscribed in a semicircle (one side a diameter) has:","a":"a right angle at the third vertex","o":["all angles equal","an obtuse angle","no special property"],"x":"Thales' theorem: an angle inscribed in a semicircle is exactly 90°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Easy"},
    {"q":"An arc that is one quarter of a circle (90°) has length:","a":"one quarter of the circumference","o":["one quarter of the radius","half the circumference","equal to the radius"],"x":"Arc length = (θ/360)·2πr, so a 90° arc is a quarter of 2πr.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"Vertical (opposite) angles formed by two crossing lines are:","a":"equal","o":["supplementary","complementary","always right angles"],"x":"Opposite angles at an intersection are always equal; neighbours are supplementary.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Easy"},
    {"q":"The angles around a single point add up to:","a":"360°","o":["180°","90°","270°"],"x":"Going once around a point is a full turn — 360°.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Easy"},
    {"q":"When a transversal crosses two parallel lines, alternate interior angles are:","a":"equal","o":["supplementary","complementary","unrelated"],"x":"Parallel lines give equal alternate interior angles (and equal corresponding angles).","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Easy"},
    {"q":"Co-interior (same-side interior) angles on a transversal between parallel lines:","a":"sum to 180°","o":["are equal","sum to 90°","sum to 360°"],"x":"Co-interior angles are supplementary when the lines are parallel.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Medium"},
    {"q":"The diagonals of a parallelogram always:","a":"bisect each other","o":["are equal in length","are perpendicular","bisect the angles"],"x":"They cross at their common midpoint, so each diagonal is cut in half.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"The diagonals of a rhombus are always:","a":"perpendicular","o":["equal in length","parallel","cut into unequal halves"],"x":"Equal sides force the diagonals to cross at right angles (and bisect each other).","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Medium"},
    {"q":"The parallelogram law states AC² + BD² (the diagonals) equals:","a":"2(a² + b²)","o":["a² + b²","4ab","(a + b)²"],"x":"The sum of the squares of the diagonals is twice the sum of the squares of two adjacent sides.","f":"ParallelogramLaw-Visual.html","t":"Parallelogram Law","c":"quad","d":"Hard"},
    {"q":"Joining the midpoints of any quadrilateral's sides always forms:","a":"a parallelogram","o":["a rectangle","a rhombus","a smaller copy"],"x":"Varignon's theorem: the midpoint figure is always a parallelogram.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Medium"},
    {"q":"In a cyclic quadrilateral, each pair of opposite angles sums to:","a":"180°","o":["90°","360°","270°"],"x":"Opposite angles of a quadrilateral inscribed in a circle are supplementary.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium"},
    {"q":"Ptolemy's theorem says the product of a cyclic quadrilateral's diagonals equals:","a":"the sum of the products of opposite sides","o":["the perimeter","the area","the sum of the four sides"],"x":"AC·BD = AB·CD + AD·BC for a quadrilateral inscribed in a circle.","f":"Ptolemy-Visual.html","t":"Ptolemy's Theorem","c":"quad","d":"Hard"},
    {"q":"Brahmagupta's formula gives the area of a cyclic quadrilateral from:","a":"its four side lengths","o":["its two diagonals","its angles","one side and the radius"],"x":"Area = √((s−a)(s−b)(s−c)(s−d)) — the cyclic-quad cousin of Heron's formula.","f":"Brahmagupta-Visual.html","t":"Brahmagupta's Formula","c":"quad","d":"Hard"},
    {"q":"In a tangential quadrilateral (one with an inscribed circle), Pitot's theorem says:","a":"AB + CD = BC + DA","o":["AB + BC = CD + DA","all sides are equal","the diagonals are equal"],"x":"The two pairs of opposite sides have equal sums when a circle fits inside.","f":"Pitot-Visual.html","t":"Pitot's Theorem","c":"quad","d":"Hard"},
    {"q":"The British Flag Theorem (rectangle, any point P) states:","a":"PA² + PC² = PB² + PD²","o":["PA + PC = PB + PD","PA · PC = PB · PD","PA² + PB² = PC² + PD²"],"x":"Squared distances to opposite corners of a rectangle are balanced.","f":"BritishFlag-Visual.html","t":"British Flag Theorem","c":"quad","d":"Hard"},
    {"q":"A trapezoid's midsegment (joining the leg midpoints) equals:","a":"the average of the two parallel sides","o":["the longer base","half the longer base","the sum of the bases"],"x":"MN = (AB + DC)/2, and it's parallel to both bases.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Medium"},

    {"q":"The two horizontal lines are parallel. The marked angles are alternate interior angles. Find x.","a":"70°","o":["110°","90°","85°"],"x":"Alternate interior angles are equal, so x = 70°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Hard","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: two parallel lines cut by a transversal with labels ›, ›, 70°, x° and figure not to scale. The unknown is marked x.\"><title>Diagram: two parallel lines cut by a transversal with labels ›, ›, 70°, x° and figure not to scale. The unknown is marked x.</title><line x1=\"28\" y1=\"48\" x2=\"272\" y2=\"48\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"28\" y1=\"125\" x2=\"272\" y2=\"125\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"266\" y=\"44\" font-size=\"14\" fill=\"#1a1a1a\">›</text><text x=\"266\" y=\"121\" font-size=\"14\" fill=\"#1a1a1a\">›</text><line x1=\"95\" y1=\"20\" x2=\"210\" y2=\"160\" stroke=\"#BA7517\" stroke-width=\"2\"/><text x=\"102\" y=\"66\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">70°</text><text x=\"189\" y=\"119\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The two horizontal lines are parallel. The marked angles are corresponding angles. Find x.","a":"125°","o":["55°","90°","140°"],"x":"Corresponding angles are equal, so x = 125°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Hard","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: two parallel lines cut by a transversal with labels ›, ›, 125°, x° and figure not to scale. The unknown is marked x.\"><title>Diagram: two parallel lines cut by a transversal with labels ›, ›, 125°, x° and figure not to scale. The unknown is marked x.</title><line x1=\"28\" y1=\"48\" x2=\"272\" y2=\"48\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"28\" y1=\"125\" x2=\"272\" y2=\"125\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"266\" y=\"44\" font-size=\"14\" fill=\"#1a1a1a\">›</text><text x=\"266\" y=\"121\" font-size=\"14\" fill=\"#1a1a1a\">›</text><line x1=\"95\" y1=\"20\" x2=\"210\" y2=\"160\" stroke=\"#BA7517\" stroke-width=\"2\"/><text x=\"102\" y=\"66\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">125°</text><text x=\"189\" y=\"119\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The two horizontal lines are parallel. The marked angles are co-interior (same-side interior) angles. Find x.","a":"70°","o":["110°","90°","85°"],"x":"Co-interior angles are supplementary: x = 180 − 110 = 70°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Hard","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: two parallel lines cut by a transversal with labels ›, ›, 110°, x° and figure not to scale. The unknown is marked x.\"><title>Diagram: two parallel lines cut by a transversal with labels ›, ›, 110°, x° and figure not to scale. The unknown is marked x.</title><line x1=\"28\" y1=\"48\" x2=\"272\" y2=\"48\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"28\" y1=\"125\" x2=\"272\" y2=\"125\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"266\" y=\"44\" font-size=\"14\" fill=\"#1a1a1a\">›</text><text x=\"266\" y=\"121\" font-size=\"14\" fill=\"#1a1a1a\">›</text><line x1=\"95\" y1=\"20\" x2=\"210\" y2=\"160\" stroke=\"#BA7517\" stroke-width=\"2\"/><text x=\"102\" y=\"66\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">110°</text><text x=\"189\" y=\"119\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The triangle is isosceles (equal sides marked). Each base angle is 50°. Find the apex angle x.","a":"80°","o":["50°","100°","90°"],"x":"Angles sum to 180°: x = 180 − 2·50 = 80°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Medium","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: a triangle with labels 50°, 50°, x° and figure not to scale. The unknown is marked x.\"><title>Diagram: a triangle with labels 50°, 50°, x° and figure not to scale. The unknown is marked x.</title><polygon points=\"70,150 230,150 150,30\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"106\" y1=\"87\" x2=\"114\" y2=\"93\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><line x1=\"186\" y1=\"93\" x2=\"194\" y2=\"87\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><text x=\"88\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">50°</text><text x=\"200\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">50°</text><text x=\"150\" y=\"54\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\" text-anchor=\"middle\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The triangle is isosceles (equal sides marked). Each base angle is 72°. Find the apex angle x.","a":"36°","o":["72°","144°","46°"],"x":"Angles sum to 180°: x = 180 − 2·72 = 36°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Medium","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: a triangle with labels 72°, 72°, x° and figure not to scale. The unknown is marked x.\"><title>Diagram: a triangle with labels 72°, 72°, x° and figure not to scale. The unknown is marked x.</title><polygon points=\"70,150 230,150 150,30\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"106\" y1=\"87\" x2=\"114\" y2=\"93\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><line x1=\"186\" y1=\"93\" x2=\"194\" y2=\"87\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><text x=\"88\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">72°</text><text x=\"200\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">72°</text><text x=\"150\" y=\"54\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\" text-anchor=\"middle\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"The triangle is isosceles (equal sides marked). Each base angle is 66°. Find the apex angle x.","a":"48°","o":["66°","132°","58°"],"x":"Angles sum to 180°: x = 180 − 2·66 = 48°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Medium","s":"<svg viewBox=\"0 0 300 185\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: a triangle with labels 66°, 66°, x° and figure not to scale. The unknown is marked x.\"><title>Diagram: a triangle with labels 66°, 66°, x° and figure not to scale. The unknown is marked x.</title><polygon points=\"70,150 230,150 150,30\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><line x1=\"106\" y1=\"87\" x2=\"114\" y2=\"93\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><line x1=\"186\" y1=\"93\" x2=\"194\" y2=\"87\" stroke=\"#1a1a1a\" stroke-width=\"1.6\"/><text x=\"88\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">66°</text><text x=\"200\" y=\"142\" font-size=\"14\" font-weight=\"700\" fill=\"#185FA5\">66°</text><text x=\"150\" y=\"54\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\" text-anchor=\"middle\">x°</text><text x=\"296\" y=\"181\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"ABCD is a cyclic quadrilateral with ∠A = 70°. Find the opposite angle x = ∠C.","a":"110°","o":["70°","290°","120°"],"x":"Opposite angles of a cyclic quadrilateral are supplementary: x = 180 − 70 = 110°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium","s":"<svg viewBox=\"0 0 300 190\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: a quadrilateral with labels 70°, x°, A, C and figure not to scale. The unknown is marked x.\"><title>Diagram: a quadrilateral with labels 70°, x°, A, C and figure not to scale. The unknown is marked x.</title><circle cx=\"150\" cy=\"95\" r=\"72\" fill=\"none\" stroke=\"#c9c9cf\" stroke-width=\"1.5\"/><polygon points=\"88,59 186,33 205,141 114,157\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"82\" y=\"59\" font-size=\"13\" font-weight=\"700\" fill=\"#185FA5\" text-anchor=\"end\">70°</text><text x=\"211\" y=\"145\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"82\" y=\"45\" font-size=\"11\" fill=\"#666\" text-anchor=\"end\">A</text><text x=\"211\" y=\"159\" font-size=\"11\" fill=\"#666\">C</text><text x=\"296\" y=\"186\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"ABCD is a cyclic quadrilateral with ∠A = 100°. Find the opposite angle x = ∠C.","a":"80°","o":["100°","260°","90°"],"x":"Opposite angles of a cyclic quadrilateral are supplementary: x = 180 − 100 = 80°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium","s":"<svg viewBox=\"0 0 300 190\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: a quadrilateral with labels 100°, x°, A, C and figure not to scale. The unknown is marked x.\"><title>Diagram: a quadrilateral with labels 100°, x°, A, C and figure not to scale. The unknown is marked x.</title><circle cx=\"150\" cy=\"95\" r=\"72\" fill=\"none\" stroke=\"#c9c9cf\" stroke-width=\"1.5\"/><polygon points=\"88,59 186,33 205,141 114,157\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"82\" y=\"59\" font-size=\"13\" font-weight=\"700\" fill=\"#185FA5\" text-anchor=\"end\">100°</text><text x=\"211\" y=\"145\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"82\" y=\"45\" font-size=\"11\" fill=\"#666\" text-anchor=\"end\">A</text><text x=\"211\" y=\"159\" font-size=\"11\" fill=\"#666\">C</text><text x=\"296\" y=\"186\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"ABCD is a cyclic quadrilateral with ∠A = 115°. Find the opposite angle x = ∠C.","a":"65°","o":["115°","245°","75°"],"x":"Opposite angles of a cyclic quadrilateral are supplementary: x = 180 − 115 = 65°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium","s":"<svg viewBox=\"0 0 300 190\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Diagram: a quadrilateral with labels 115°, x°, A, C and figure not to scale. The unknown is marked x.\"><title>Diagram: a quadrilateral with labels 115°, x°, A, C and figure not to scale. The unknown is marked x.</title><circle cx=\"150\" cy=\"95\" r=\"72\" fill=\"none\" stroke=\"#c9c9cf\" stroke-width=\"1.5\"/><polygon points=\"88,59 186,33 205,141 114,157\" fill=\"#378ADD\" fill-opacity=\"0.06\" stroke=\"#1a1a1a\" stroke-width=\"2\"/><text x=\"82\" y=\"59\" font-size=\"13\" font-weight=\"700\" fill=\"#185FA5\" text-anchor=\"end\">115°</text><text x=\"211\" y=\"145\" font-size=\"14\" font-weight=\"700\" fill=\"#b22a28\">x°</text><text x=\"82\" y=\"45\" font-size=\"11\" fill=\"#666\" text-anchor=\"end\">A</text><text x=\"211\" y=\"159\" font-size=\"11\" fill=\"#666\">C</text><text x=\"296\" y=\"186\" font-size=\"9\" fill=\"#9a9aa2\" text-anchor=\"end\">figure not to scale</text></svg>"},
    {"q":"In a parallelogram, one angle measures 65°. What is each adjacent angle?","a":"115°","o":["65°","90°","125°"],"x":"Consecutive angles of a parallelogram are supplementary: 180−65 = 115°.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"The diagonals of a parallelogram bisect each other. If one diagonal is 14 cm, how long is each half?","a":"7 cm","o":["14 cm","10 cm","28 cm"],"x":"Bisect means split into two equal halves: 14 ÷ 2 = 7 cm.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Easy"},
    {"q":"In parallelogram ABCD the diagonals meet at O with AO = 3x−1 and OC = x+7. Find x.","a":"4","o":["3","8","2"],"x":"Diagonals bisect each other, so AO = OC: 3x−1 = x+7 → 2x = 8 → x = 4.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Medium"},
    {"q":"In a parallelogram, one angle is three times an adjacent angle. Find the larger angle.","a":"135°","o":["120°","45°","90°"],"x":"Adjacent angles are supplementary: x + 3x = 180 → x = 45, so the larger is 135°.","f":"ParallelogramDiagonals-Visual.html","t":"Diagonals Bisect","c":"quad","d":"Medium"},
    {"q":"At what angle do the diagonals of a rhombus intersect?","a":"90°","o":["60°","45°","120°"],"x":"A rhombus's diagonals are perpendicular bisectors of each other.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Easy"},
    {"q":"A rhombus has diagonals 6 and 8. Find its side length.","a":"5","o":["7","10","14"],"x":"The half-diagonals 3 and 4 are legs of a right triangle: side = √(3²+4²) = 5.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Medium"},
    {"q":"Find the area of a rhombus with diagonals 10 and 24.","a":"120","o":["240","170","60"],"x":"Area of a rhombus = ½·d₁·d₂ = ½·10·24 = 120.","f":"RhombusDiagonals-Visual.html","t":"Rhombus Diagonals","c":"quad","d":"Hard"},
    {"q":"Joining the midpoints of the sides of any quadrilateral always forms a:","a":"parallelogram","o":["rhombus","trapezoid","kite"],"x":"Varignon's theorem: the midpoint quadrilateral is always a parallelogram.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Easy"},
    {"q":"A quadrilateral has diagonals 10 and 14. Find the perimeter of its Varignon (midpoint) parallelogram.","a":"24","o":["12","48","17"],"x":"Each side of the Varignon parallelogram is half a diagonal, so the perimeter equals d₁+d₂ = 10+14 = 24.","f":"Varignon-Visual.html","t":"Varignon's Theorem","c":"quad","d":"Hard"},
    {"q":"A trapezoid has parallel sides 8 and 12. Find the length of its midsegment.","a":"10","o":["20","4","16"],"x":"The midsegment is the average of the two bases: (8+12)/2 = 10.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Easy"},
    {"q":"A trapezoid's midsegment is 9 and one base is 6. Find the other base.","a":"12","o":["3","15","18"],"x":"Midsegment = (b₁+b₂)/2, so b₂ = 2·9 − 6 = 12.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Medium"},
    {"q":"A trapezoid has parallel sides 10 and 16 and height 5. Find its area.","a":"65","o":["130","80","41"],"x":"Area = ½(b₁+b₂)·h = ½(10+16)·5 = 65.","f":"TrapezoidMidsegment-Visual.html","t":"Trapezoid Midsegment","c":"quad","d":"Hard"},
    {"q":"In a cyclic quadrilateral, one angle is 85°. Find the opposite angle.","a":"95°","o":["85°","105°","90°"],"x":"Opposite angles of a cyclic quadrilateral are supplementary: 180−85 = 95°.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Easy"},
    {"q":"In a cyclic quadrilateral, two opposite angles are 2x and (x+30). Find x.","a":"50","o":["60","40","75"],"x":"Opposite angles sum to 180°: 2x + x + 30 = 180 → 3x = 150 → x = 50.","f":"CyclicQuadrilateral-Visual.html","t":"Cyclic Quadrilateral","c":"quad","d":"Medium"},
    {"q":"A rectangle has sides 6 and 8. Using Ptolemy's theorem on this cyclic quadrilateral, find the diagonal.","a":"10","o":["14","7","12"],"x":"Ptolemy: diagonal² = 6·6 + 8·8 = 100, so the diagonal is 10.","f":"Ptolemy-Visual.html","t":"Ptolemy's Theorem","c":"quad","d":"Hard"},
    {"q":"A tangential quadrilateral (one with an inscribed circle) has sides 5, 7, 9, and x in order. Find x.","a":"7","o":["11","9","5"],"x":"Pitot's theorem: opposite sides have equal sums, 5+9 = 7+x → x = 7.","f":"Pitot-Visual.html","t":"Pitot's Theorem","c":"quad","d":"Medium"},
    {"q":"For a point P and rectangle ABCD, PA=6, PC=7, and PB=2. Find PD.","a":"9","o":["11","5","7"],"x":"British Flag theorem: PA²+PC² = PB²+PD² → 36+49 = 4+PD² → PD² = 81 → PD = 9.","f":"BritishFlag-Visual.html","t":"British Flag Theorem","c":"quad","d":"Hard"},

    {"q":"A dilation with scale factor 4 maps a segment of length 3 to a segment of length:","a":"12","o":["7","3/4","1"],"x":"Lengths scale by the factor: 3·4 = 12.","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Medium"},
    {"q":"A dilation centered at the origin with scale factor k changes a figure's area by a factor of:","a":"k²","o":["k","2k","k³"],"x":"Lengths scale by k, so areas scale by k².","f":"Dilation-Visual.html","t":"Dilation (Scaling)","c":"transform","d":"Hard"},
    {"q":"Reflecting a figure over two parallel lines is equivalent to a single:","a":"translation","o":["rotation","reflection","dilation"],"x":"Two parallel reflections compose to a translation (twice the distance between the lines).","f":"TwoReflections-Visual.html","t":"Two Reflections","c":"transform","d":"Medium"},
    {"q":"Two parallel mirror lines are 5 cm apart. The equivalent single translation moves each point by:","a":"10 cm","o":["5 cm","2.5 cm","25 cm"],"x":"Two parallel reflections give a translation of twice the gap: 2·5 = 10 cm.","f":"TwoReflections-Visual.html","t":"Two Reflections","c":"transform","d":"Hard"},
    {"q":"Two mirror lines meet at 35°. The equivalent single rotation turns the figure by:","a":"70°","o":["35°","17.5°","145°"],"x":"Two intersecting reflections give a rotation of twice the angle between them: 2·35 = 70°.","f":"TwoReflections-Visual.html","t":"Two Reflections","c":"transform","d":"Hard"},
    {"q":"A glide reflection is the composition of a reflection and a:","a":"translation","o":["rotation","dilation","second reflection"],"x":"A glide reflection is a reflection followed by a translation parallel to the mirror line.","f":"GlideReflection-Visual.html","t":"Glide Reflection","c":"transform","d":"Medium"},
    {"q":"A trail of footprints (left, right, left, right…) is a real-world example of which symmetry?","a":"glide reflection","o":["rotation","dilation","pure translation"],"x":"Each footprint is the previous one reflected and slid forward — a glide reflection.","f":"GlideReflection-Visual.html","t":"Glide Reflection","c":"transform","d":"Hard"},
    {"q":"A right triangle has legs 8 and 15. Find the hypotenuse.","a":"17","o":["23","19","13"],"x":"Pythagoras: √(8²+15²) = √289 = 17.","f":"GeoProof-Visual.html","t":"Pythagorean Theorem","c":"triangle","d":"Easy"},
    {"q":"A right triangle has legs 7 and 24. Find the hypotenuse.","a":"25","o":["31","28","17"],"x":"√(7²+24²) = √625 = 25.","f":"GeoProof-Visual.html","t":"Pythagorean Theorem","c":"triangle","d":"Easy"},
    {"q":"A right triangle has a leg of 9 and a hypotenuse of 41. Find the other leg.","a":"40","o":["32","38","30"],"x":"√(41²−9²) = √1600 = 40.","f":"GeoProof-Visual.html","t":"Pythagorean Theorem","c":"triangle","d":"Medium"},
    {"q":"A triangle has sides 5 and 8 with a 60° angle between them. Find the third side.","a":"7","o":["9","13","6"],"x":"Law of cosines: c² = 25+64 − 2·5·8·cos60° = 89 − 40 = 49 → c = 7.","f":"LawOfCosines-Visual.html","t":"Law of Cosines","c":"triangle","d":"Medium"},
    {"q":"A triangle has sides 3 and 5 with a 120° angle between them. Find the third side.","a":"7","o":["8","4","6"],"x":"c² = 9+25 − 2·3·5·cos120° = 34 + 15 = 49 → c = 7.","f":"LawOfCosines-Visual.html","t":"Law of Cosines","c":"triangle","d":"Hard"},
    {"q":"A triangle has sides 5, 5, and 6. Find its area.","a":"12","o":["15","24","9"],"x":"Heron: s = 8, Area = √(8·3·3·2) = √144 = 12.","f":"Heron-Visual.html","t":"Heron's Formula","c":"triangle","d":"Medium"},
    {"q":"A triangle has sides 6, 8, and 10. Find its area.","a":"24","o":["48","30","40"],"x":"It is right-angled, so Area = ½·6·8 = 24.","f":"Heron-Visual.html","t":"Heron's Formula","c":"triangle","d":"Medium"},
    {"q":"Two angles of a triangle are 47° and 68°. Find the third angle.","a":"65°","o":["75°","55°","115°"],"x":"Angles sum to 180°: 180 − 47 − 68 = 65°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"triangle","d":"Easy"},
    {"q":"An exterior angle of a triangle is 130° and one remote interior angle is 55°. Find the other remote interior angle.","a":"75°","o":["85°","50°","65°"],"x":"The exterior angle equals the sum of the remote interior angles: 130 − 55 = 75°.","f":"ExteriorAngle-Visual.html","t":"Exterior Angle Theorem","c":"triangle","d":"Medium"},
    {"q":"An isosceles triangle has a vertex angle of 40°. Find each base angle.","a":"70°","o":["40°","50°","140°"],"x":"Base angles are equal: (180 − 40)/2 = 70°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Easy"},
    {"q":"An isosceles triangle has base angles of 65° each. Find the vertex angle.","a":"50°","o":["65°","115°","25°"],"x":"Vertex = 180 − 2·65 = 50°.","f":"Isosceles-Visual.html","t":"Isosceles Triangle","c":"triangle","d":"Medium"},
    {"q":"The centroid divides each median in a 2:1 ratio. If a median is 18 cm, how far is the centroid from the vertex?","a":"12 cm","o":["6 cm","9 cm","18 cm"],"x":"The vertex-to-centroid part is 2/3 of the median: 2/3·18 = 12 cm.","f":"CentroidMedians-Visual.html","t":"Centroid & the 2:1 Median","c":"triangle","d":"Medium"},
    {"q":"Find the area of a triangle with sides 6 and 10 and an included angle of 30°.","a":"15","o":["30","26","7.5"],"x":"Area = ½·a·b·sinC = ½·6·10·sin30° = 30·0.5 = 15.","f":"TriangleAreaSine-Visual.html","t":"Triangle Area (sine)","c":"triangle","d":"Medium"},
    {"q":"In a triangle, side a = 10 lies opposite angle A = 30°. Find the circumradius R.","a":"10","o":["20","5","15"],"x":"Law of sines: a/sinA = 2R → 10/0.5 = 20 = 2R → R = 10.","f":"LawOfSinesCircumradius-Visual.html","t":"Sine Rule & 2R","c":"triangle","d":"Hard"},
    {"q":"Two sides of a triangle are 7 and 10. The third side must lie strictly between:","a":"3 and 17","o":["7 and 10","0 and 17","3 and 70"],"x":"Triangle inequality: it must exceed 10−7 = 3 and be less than 10+7 = 17.","f":"TriangleInequality-Visual.html","t":"Triangle Inequality","c":"triangle","d":"Medium"},
    {"q":"In a right triangle the median to the hypotenuse equals half the hypotenuse. If the hypotenuse is 26, find that median.","a":"13","o":["26","6.5","52"],"x":"The median to the hypotenuse is half of it: 26/2 = 13.","f":"RightMedian-Visual.html","t":"Median to Hypotenuse","c":"triangle","d":"Hard"},
    {"q":"In a right triangle, the altitude to the hypotenuse divides it into 4 and 9. Find the altitude.","a":"6","o":["6.5","13","36"],"x":"The altitude is the geometric mean of the two parts: √(4·9) = 6.","f":"GeometricMean-Visual.html","t":"Geometric Mean","c":"triangle","d":"Hard"},
    {"q":"A central angle measures 100°. Find the inscribed angle that subtends the same arc.","a":"50°","o":["100°","25°","80°"],"x":"An inscribed angle is half the central angle on the same arc: 100/2 = 50°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Easy"},
    {"q":"An inscribed angle measures 35°. Find the arc it intercepts.","a":"70°","o":["35°","17.5°","145°"],"x":"The intercepted arc is twice the inscribed angle: 2·35 = 70°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Easy"},
    {"q":"An angle inscribed in a semicircle measures:","a":"90°","o":["45°","180°","60°"],"x":"It subtends a diameter (a 180° arc), so it is half of that: 90°.","f":"InscribedAngle-Visual.html","t":"Inscribed Angle Theorem","c":"circle","d":"Easy"},
    {"q":"Two chords intersect inside a circle, intercepting arcs of 40° and 80°. Find the angle between them.","a":"60°","o":["120°","20°","40°"],"x":"The angle is the average of the two arcs: (40+80)/2 = 60°.","f":"IntersectingChordsAngle-Visual.html","t":"Intersecting Chords Angle","c":"circle","d":"Medium"},
    {"q":"Two secants from an external point intercept arcs of 90° and 30°. Find the angle at that point.","a":"30°","o":["60°","120°","15°"],"x":"External angle = half the difference of the arcs: (90−30)/2 = 30°.","f":"SecantsAngle-Visual.html","t":"Intersecting Secants Angle","c":"circle","d":"Medium"},
    {"q":"A tangent and a chord meet at the point of tangency, intercepting a 100° arc. Find the tangent–chord angle.","a":"50°","o":["100°","25°","80°"],"x":"The tangent–chord angle is half the intercepted arc: 100/2 = 50°.","f":"TangentChordAngle-Visual.html","t":"Tangent–Chord Angle","c":"circle","d":"Medium"},
    {"q":"Two tangents from an external point intercept a far arc of 220° and a near arc of 140°. Find the angle between the tangents.","a":"40°","o":["80°","180°","30°"],"x":"Angle = half the difference of the arcs: (220−140)/2 = 40°.","f":"TangentTangentAngle-Visual.html","t":"Tangent–Tangent Angle","c":"circle","d":"Medium"},
    {"q":"Two chords cross inside a circle. One is divided into 3 and 8; the other into 4 and x. Find x.","a":"6","o":["24","4","12"],"x":"Intersecting chords: 3·8 = 4·x → x = 6.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Medium"},
    {"q":"From an external point, a tangent of length 6 and a secant are drawn; the secant's external segment is 4. Find the secant's full length.","a":"9","o":["8","6","13"],"x":"Tangent² = external·whole → 36 = 4·whole → whole = 9.","f":"PowerOfAPoint-Visual.html","t":"Power of a Point","c":"circle","d":"Hard"},
    {"q":"A tangent line touches a circle. What angle does it make with the radius at the point of tangency?","a":"90°","o":["45°","180°","60°"],"x":"A tangent is perpendicular to the radius at the point of contact.","f":"TangentRadius-Visual.html","t":"Tangent ⟂ Radius","c":"circle","d":"Easy"},
    {"q":"Two tangent segments to a circle from the same external point measure 9 cm and (2x+1) cm. Find x.","a":"4","o":["4.5","5","8"],"x":"Tangents from a point are equal: 2x+1 = 9 → x = 4.","f":"EqualTangents-Visual.html","t":"Equal Tangents","c":"circle","d":"Medium"},
    {"q":"A radius drawn to the midpoint of a chord meets the chord at what angle?","a":"90°","o":["45°","60°","30°"],"x":"The line from the center to a chord's midpoint is perpendicular to the chord.","f":"ChordBisector-Visual.html","t":"Chord & Center","c":"circle","d":"Easy"},
    {"q":"A circle has radius 7. Find its circumference (use π ≈ 3.14).","a":"≈ 44","o":["≈ 22","≈ 154","≈ 14"],"x":"C = 2πr ≈ 2·3.14·7 ≈ 44.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Easy"},
    {"q":"Find the arc length of a 90° sector in a circle of radius 8 (π ≈ 3.14).","a":"≈ 12.6","o":["≈ 6.3","≈ 50.3","≈ 25.1"],"x":"Arc = (90/360)·2πr = ¼·2·3.14·8 ≈ 12.6.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Medium"},
    {"q":"Find the area of a 90° sector in a circle of radius 6 (π ≈ 3.14).","a":"≈ 28.3","o":["≈ 113","≈ 9.4","≈ 14.1"],"x":"Area = (90/360)·πr² = ¼·3.14·36 ≈ 28.3.","f":"ArcSector-Visual.html","t":"Arc Length & Sector Area","c":"circle","d":"Hard"},
    {"q":"A triangle has sides 6, 8, 10 and area 24. Find its circumradius R = abc/(4·Area).","a":"5","o":["10","2.5","4"],"x":"R = (6·8·10)/(4·24) = 480/96 = 5.","f":"AreaCircumradius-Visual.html","t":"Area = abc/4R","c":"circle","d":"Hard"},
    {"q":"Two angles are complementary and one is 37°. Find the other.","a":"53°","o":["143°","63°","27°"],"x":"Complementary angles sum to 90°: 90 − 37 = 53°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Easy"},
    {"q":"Two angles are supplementary and one is 118°. Find the other.","a":"62°","o":["72°","28°","82°"],"x":"Supplementary angles sum to 180°: 180 − 118 = 62°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Easy"},
    {"q":"Angle A and angle B are complementary, and A is twice B. Find A.","a":"60°","o":["30°","45°","120°"],"x":"B + 2B = 90 → B = 30, so A = 60°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Medium"},
    {"q":"Two lines cross and one angle is 74°. Find its vertical angle.","a":"74°","o":["106°","16°","148°"],"x":"Vertical angles are equal, so it is also 74°.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Easy"},
    {"q":"Two lines cross and one angle is 74°. Find an angle adjacent to it.","a":"106°","o":["74°","16°","53°"],"x":"Adjacent angles on a line are supplementary: 180 − 74 = 106°.","f":"VerticalAngles-Visual.html","t":"Vertical Angles","c":"angle","d":"Medium"},
    {"q":"Three angles around a point are 120°, 150°, and x. Find x.","a":"90°","o":["60°","120°","30°"],"x":"Angles around a point sum to 360°: 360 − 120 − 150 = 90°.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Easy"},
    {"q":"Four equal angles meet around a point. Find each one.","a":"90°","o":["60°","120°","72°"],"x":"360 ÷ 4 = 90°.","f":"AnglesAroundPoint-Visual.html","t":"Angles Around a Point","c":"angle","d":"Medium"},
    {"q":"A transversal crosses two parallel lines. One co-interior (same-side interior) angle is 110°. Find the other.","a":"70°","o":["110°","55°","35°"],"x":"Co-interior angles are supplementary: 180 − 110 = 70°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Medium"},
    {"q":"Two parallel lines are cut by a transversal. One of a pair of corresponding angles is 65°. Find the other.","a":"65°","o":["115°","25°","130°"],"x":"Corresponding angles are equal: 65°.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Easy"},
    {"q":"Two parallel lines are cut by a transversal; alternate interior angles are 3x and (x+40). Find x.","a":"20","o":["10","40","30"],"x":"Alternate interior angles are equal: 3x = x+40 → x = 20.","f":"ParallelTransversal-Visual.html","t":"Parallel Lines & Transversal","c":"angle","d":"Medium"},
    {"q":"A right triangle has one acute angle of 32°. Find the other acute angle.","a":"58°","o":["148°","68°","48°"],"x":"The two acute angles of a right triangle sum to 90°: 90 − 32 = 58°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Easy"},
    {"q":"An angle bisector splits a 96° angle into two angles of what measure?","a":"48°","o":["96°","192°","24°"],"x":"A bisector halves the angle: 96 / 2 = 48°.","f":"AngleBisectorLocus-Visual.html","t":"Angle Bisector (Locus)","c":"angle","d":"Easy"},
    {"q":"Two angles form a linear pair and one is 40°. Find the other.","a":"140°","o":["50°","40°","320°"],"x":"A linear pair is supplementary: 180 − 40 = 140°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Easy"},
    {"q":"The angles of a triangle are in the ratio 2:3:4. Find the largest angle.","a":"80°","o":["90°","60°","72°"],"x":"2x+3x+4x = 180 → 9x = 180 → x = 20; the largest is 4·20 = 80°.","f":"TriangleAngleSum-Visual.html","t":"Triangle Angle Sum","c":"angle","d":"Medium"},
    {"q":"Two supplementary angles are in the ratio 4:5. Find the smaller angle.","a":"80°","o":["100°","72°","90°"],"x":"4x+5x = 180 → x = 20; the smaller is 4·20 = 80°.","f":"CompSuppAngles-Visual.html","t":"Complementary & Supplementary","c":"angle","d":"Hard"},
    {"q":"What is the sum of the exterior angles of any convex polygon?","a":"360°","o":["180°","540°","720°"],"x":"The exterior angles of any convex polygon always sum to 360°.","f":"PolygonExteriorAngleSum-Visual.html","t":"Sum of Exterior Angles","c":"polygon","d":"Easy"},
    {"q":"Each exterior angle of a regular polygon is 24°. How many sides does it have?","a":"15","o":["12","24","10"],"x":"n = 360 / exterior angle = 360 / 24 = 15.","f":"PolygonExteriorAngleSum-Visual.html","t":"Sum of Exterior Angles","c":"polygon","d":"Medium"},
    {"q":"Find each exterior angle of a regular decagon (10 sides).","a":"36°","o":["144°","18°","72°"],"x":"Each exterior angle = 360 / n = 360 / 10 = 36°.","f":"PolygonExteriorAngleSum-Visual.html","t":"Sum of Exterior Angles","c":"polygon","d":"Medium"},
    {"q":"Find the sum of the interior angles of a pentagon.","a":"540°","o":["360°","720°","450°"],"x":"(n−2)·180 = (5−2)·180 = 540°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Easy"},
    {"q":"Find the sum of the interior angles of a hexagon.","a":"720°","o":["1080°","540°","360°"],"x":"(6−2)·180 = 720°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Easy"},
    {"q":"Find each interior angle of a regular octagon.","a":"135°","o":["120°","144°","150°"],"x":"(8−2)·180 / 8 = 1080/8 = 135°.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"The interior angles of a polygon sum to 1440°. How many sides does it have?","a":"10","o":["8","9","12"],"x":"(n−2)·180 = 1440 → n−2 = 8 → n = 10.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"Each interior angle of a regular polygon is 140°. How many sides does it have?","a":"9","o":["7","10","8"],"x":"Exterior angle = 180 − 140 = 40; n = 360/40 = 9.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Medium"},
    {"q":"How many diagonals does an octagon have?","a":"20","o":["16","28","24"],"x":"n(n−3)/2 = 8·5/2 = 20.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Hard"},
    {"q":"The five point-angles of a five-pointed star sum to:","a":"180°","o":["360°","540°","90°"],"x":"For a standard 5-pointed star the point angles total 180°.","f":"StarAngleSum-Visual.html","t":"Star Angle Sum","c":"polygon","d":"Medium"},
    {"q":"A triangle has vertices (0,0), (6,0), and (3,4). Find its area.","a":"12","o":["24","14","10"],"x":"Base 6, height 4: Area = ½·6·4 = 12 (the shoelace formula agrees).","f":"Shoelace-Visual.html","t":"Shoelace Formula","c":"polygon","d":"Medium"},
    {"q":"Find the area of the quadrilateral with vertices (0,0), (5,0), (5,3), (0,4).","a":"17.5","o":["35","20","15"],"x":"Shoelace: ½|0+15+20+0| = ½·35 = 17.5.","f":"Shoelace-Visual.html","t":"Shoelace Formula","c":"polygon","d":"Hard"},
    {"q":"By Pick's theorem (Area = I + B/2 − 1), a lattice polygon has 6 interior and 8 boundary points. Find its area.","a":"9","o":["10","8","13"],"x":"Area = 6 + 8/2 − 1 = 6 + 4 − 1 = 9.","f":"Picks-Visual.html","t":"Pick's Theorem","c":"polygon","d":"Medium"},
    {"q":"A lattice polygon has area 10 and 6 boundary points. By Pick's theorem, how many interior points does it have?","a":"8","o":["6","7","12"],"x":"10 = I + 6/2 − 1 → 10 = I + 2 → I = 8.","f":"Picks-Visual.html","t":"Pick's Theorem","c":"polygon","d":"Hard"},
    {"q":"A regular hexagon can be divided into how many congruent equilateral triangles?","a":"6","o":["4","8","3"],"x":"Connecting the center to each vertex gives 6 equilateral triangles.","f":"RegularPolygonArea-Visual.html","t":"Regular Polygon Area","c":"polygon","d":"Easy"},
    {"q":"How many diagonals does a pentagon have?","a":"5","o":["10","4","2"],"x":"n(n−3)/2 = 5·2/2 = 5.","f":"PolygonAngleSum-Visual.html","t":"Angle Sum of Polygons","c":"polygon","d":"Easy"},
